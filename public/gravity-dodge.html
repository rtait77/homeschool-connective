<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gravity Dodge</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: url('/space-bg.png') center/cover no-repeat fixed;
      font-family: 'Nunito', sans-serif;
      color: white;
      overflow: hidden;
      width: 100vw; height: 100vh;
    }

    /* HUD */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 44px 16px 8px;
      background: rgba(0,0,0,0.25);
      z-index: 10;
    }
    #hud-left { display: flex; flex-direction: column; gap: 2px; }
    #distance {
      font-size: clamp(14px, 3.5vw, 24px); font-weight: 900;
      text-shadow: 0 0 12px #fff, 0 2px 8px rgba(0,0,0,0.8);
    }
    #lives-display {
      font-size: clamp(16px, 3vw, 24px);
      display: flex; gap: 4px;
      filter: drop-shadow(0 0 4px #ff6b6b);
    }
    #speed-label {
      font-size: clamp(11px, 2.5vw, 16px); font-weight: 700;
      color: #a8f0ff; text-shadow: 0 2px 6px rgba(0,0,0,0.8);
    }

    /* Game area */
    #game-area {
      position: fixed; inset: 0;
      overflow: hidden;
    }

    /* Ship */
    #ship {
      position: absolute; z-index: 5;
      width: 56px; height: 56px;
      transition: none;
      filter: drop-shadow(0 0 8px rgba(85,182,202,0.5));
    }
    #ship.invincible {
      animation: blink 0.15s infinite alternate;
    }
    @keyframes blink {
      from { opacity: 0.4; }
      to { opacity: 1; }
    }

    /* Obstacles */
    .obstacle-col {
      position: absolute; z-index: 3;
      width: 48px;
      background: linear-gradient(90deg, #3a2a1a, #6b5a48, #3a2a1a);
      border-radius: 6px;
      box-shadow: 0 0 12px rgba(0,0,0,0.6);
    }
    .obstacle-col::before {
      content: '';
      position: absolute; left: -4px; right: -4px;
      height: 16px;
      background: radial-gradient(ellipse, #7a6a56 30%, transparent 70%);
      border-radius: 50%;
    }
    .obstacle-top::before { bottom: -8px; }
    .obstacle-bottom::before { top: -8px; }

    /* Milestone popup */
    #milestone {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center; z-index: 15;
      opacity: 0; transition: opacity 0.5s;
      pointer-events: none;
    }
    #milestone img {
      width: clamp(60px, 15vw, 100px);
      height: clamp(60px, 15vw, 100px);
      object-fit: contain; margin-bottom: 8px;
    }
    #milestone .ms-name {
      font-size: clamp(20px, 5vw, 32px); font-weight: 900;
      color: #55b6ca;
      text-shadow: 0 2px 12px rgba(85,182,202,0.5);
    }
    #milestone .ms-dist {
      font-size: clamp(12px, 3vw, 18px); font-weight: 700;
      color: #ccc; margin: 4px 0;
    }
    #milestone .ms-fact {
      font-size: clamp(11px, 2.5vw, 15px); font-weight: 600;
      color: #aaa; max-width: 320px; line-height: 1.5;
      margin: 0 auto;
    }

    /* Overlay screens */
    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(5, 10, 30, 0.88);
      z-index: 200; text-align: center; padding: 24px;
    }
    #overlay h1 {
      font-size: clamp(26px, 6vw, 60px);
      font-weight: 900; margin-bottom: 12px; line-height: 1.1;
    }
    #overlay p {
      font-size: clamp(15px, 3vw, 28px);
      margin-bottom: 20px; color: #c8e6ff; line-height: 1.5;
    }
    #overlay .sub {
      font-size: clamp(12px, 2.5vw, 18px);
      color: #888; margin-top: 12px;
    }
    .btn {
      background: #ed7c5a; color: white; border: none;
      border-radius: 100px; font-family: 'Nunito', sans-serif;
      font-size: clamp(15px, 3vw, 24px); font-weight: 900;
      padding: 12px 28px; cursor: pointer; margin: 4px;
      transition: transform 0.1s, background 0.15s;
      text-decoration: none; display: inline-block;
    }
    .btn:hover { transform: scale(1.05); background: #d96a47; }
    .btn-secondary {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.25); }

    #game-over-stats { color: #a8f0ff; font-weight: 800; margin-bottom: 6px; }
    #game-over-best { color: #888; font-weight: 600; margin-bottom: 20px; font-size: clamp(12px, 2.5vw, 18px); }
  </style>
</head>
<body>

<div id="game-area"></div>

<div id="ship">
  <svg viewBox="0 0 56 56" width="56" height="56">
    <polygon points="56,28 8,6 18,28 8,50" fill="#e8e8e8" stroke="#ccc" stroke-width="1"/>
    <circle cx="38" cy="28" r="7" fill="#55b6ca"/>
    <polygon points="18,22 4,28 18,34" fill="#ed7c5a" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="0.3s" repeatCount="indefinite"/>
    </polygon>
  </svg>
</div>

<div id="hud">
  <div id="hud-left">
    <div id="distance">0 miles</div>
    <div id="lives-display"></div>
  </div>
  <div id="speed-label"></div>
</div>

<div id="milestone">
  <img id="ms-img" src="" alt="">
  <div class="ms-name" id="ms-name"></div>
  <div class="ms-dist" id="ms-dist"></div>
  <div class="ms-fact" id="ms-fact"></div>
</div>

<div id="overlay" data-screen="start">
  <h1>Gravity Dodge</h1>
  <p>Fly through the solar system.<br>How far can you go?</p>
  <button class="btn" id="start-btn">Start</button>
  <p class="sub">Press SPACE or tap to boost &middot; Dodge the asteroids</p>
</div>

<script>
const CONFIG = {
  GRAVITY: 0.32,
  BOOST: -6,
  SHIP_SIZE: 56,
  SHIP_X_PCT: 0.15,
  INITIAL_SPEED: 2.5,
  MAX_SPEED: 8,
  SPEED_RAMP: 0.00004,
  GAP_MIN: 155,
  GAP_MAX: 260,
  OBS_WIDTH: 48,
  OBS_SPACING: 300,
  MAX_LIVES: 3,
  INVINCIBLE_MS: 1500,
  MILES_PER_FRAME: 6000,
};

const MILESTONES = [
  { name: 'Mercury', dist: 36, img: '/mercury.png', fact: 'Mercury is the smallest planet and has no atmosphere to retain heat \u2014 temperatures swing from 800\u00b0F to \u2212290\u00b0F.' },
  { name: 'Venus', dist: 67.2, img: '/venus.png', fact: 'Venus spins backward compared to most planets, and a day on Venus is longer than its year.' },
  { name: 'Earth', dist: 93, img: '/earth.png', fact: 'Earth is the only known planet with liquid water on its surface and the only one known to support life.' },
  { name: 'Mars', dist: 141.6, img: '/mars.png', fact: 'Mars has the tallest volcano in the solar system \u2014 Olympus Mons, standing about 72,000 feet tall.' },
  { name: 'Jupiter', dist: 483.8, img: '/jupiter.png', fact: 'Jupiter is so large that more than 1,300 Earths could fit inside it. Its Great Red Spot is a storm that has raged for over 300 years.' },
  { name: 'Saturn', dist: 890.8, img: '/saturn.png', fact: "Saturn's rings are made mostly of ice and rock. They stretch out over 280,000 miles but are only about 30 feet thick." },
  { name: 'Uranus', dist: 1784, img: '/uranus.png', fact: 'Uranus rotates on its side, with an axial tilt of about 98 degrees. Scientists believe a massive collision knocked it over.' },
  { name: 'Neptune', dist: 2793, img: '/neptune.png', fact: 'Neptune has the strongest winds in the solar system, reaching speeds of over 1,200 miles per hour.' },
];

// State
let shipY, shipVY, speed, distance, lives, invincibleUntil;
let obstacles = [];
let running = false, gameOver = false;
let nextMilestone = 0, milestoneTimer = 0;
let bestScore = parseInt(localStorage.getItem('gravityDodgeBest') || '0');
let animId;

const gameArea = document.getElementById('game-area');
const shipEl = document.getElementById('ship');
const distEl = document.getElementById('distance');
const livesEl = document.getElementById('lives-display');
const speedEl = document.getElementById('speed-label');
const overlay = document.getElementById('overlay');

function W() { return window.innerWidth; }
function H() { return window.innerHeight; }

function formatDist(miles) {
  if (miles >= 1e9) return (miles / 1e9).toFixed(1) + ' billion miles';
  if (miles >= 1e6) return (miles / 1e6).toFixed(1) + ' million miles';
  return Math.floor(miles).toLocaleString() + ' miles';
}

function updateLives() {
  let s = '';
  for (let i = 0; i < CONFIG.MAX_LIVES; i++) s += i < lives ? '\u2764\ufe0f' : '\ud83d\udda4';
  livesEl.textContent = s;
}

// Obstacles (DOM-based)
function createObstacle(x) {
  const h = H();
  const gap = CONFIG.GAP_MIN + Math.random() * (CONFIG.GAP_MAX - CONFIG.GAP_MIN);
  const scaledGap = gap * Math.max(0.72, 1 - (speed - CONFIG.INITIAL_SPEED) / (CONFIG.MAX_SPEED - CONFIG.INITIAL_SPEED) * 0.28);
  const gapY = Math.random() * (h - scaledGap - 100) + 50;

  const top = document.createElement('div');
  top.className = 'obstacle-col obstacle-top';
  top.style.left = x + 'px';
  top.style.top = '0';
  top.style.height = gapY + 'px';
  gameArea.appendChild(top);

  const bot = document.createElement('div');
  bot.className = 'obstacle-col obstacle-bottom';
  bot.style.left = x + 'px';
  bot.style.top = (gapY + scaledGap) + 'px';
  bot.style.height = (h - gapY - scaledGap) + 'px';
  gameArea.appendChild(bot);

  obstacles.push({ x, gapY, gapH: scaledGap, topEl: top, botEl: bot });
}

function clearObstacles() {
  for (const ob of obstacles) { ob.topEl.remove(); ob.botEl.remove(); }
  obstacles = [];
}

// Init
function init() {
  clearObstacles();
  shipY = H() / 2;
  shipVY = 0;
  speed = CONFIG.INITIAL_SPEED;
  distance = 0;
  lives = CONFIG.MAX_LIVES;
  invincibleUntil = 0;
  nextMilestone = 0;
  milestoneTimer = 0;
  gameOver = false;
  updateLives();
  distEl.textContent = '0 miles';
  speedEl.textContent = '';

  for (let x = W() + 200; x < W() + 1800; x += CONFIG.OBS_SPACING) {
    createObstacle(x);
  }
}

// Collision
function checkCollision() {
  if (Date.now() < invincibleUntil) return false;
  const sx = W() * CONFIG.SHIP_X_PCT;
  const sr = CONFIG.SHIP_SIZE * 0.35;
  const sy = shipY;

  if (sy - sr < 0 || sy + sr > H()) return true;

  for (const ob of obstacles) {
    if (sx + sr > ob.x && sx - sr < ob.x + CONFIG.OBS_WIDTH) {
      if (sy - sr < ob.gapY || sy + sr > ob.gapY + ob.gapH) return true;
    }
  }
  return false;
}

// Milestones
function checkMilestones() {
  if (nextMilestone >= MILESTONES.length) return;
  const ms = MILESTONES[nextMilestone];
  if (distance / 1e6 >= ms.dist) {
    showMilestone(ms);
    nextMilestone++;
  }
}

function showMilestone(ms) {
  document.getElementById('ms-img').src = ms.img;
  document.getElementById('ms-name').textContent = ms.name;
  document.getElementById('ms-dist').textContent = formatDist(ms.dist * 1e6) + ' from the Sun';
  document.getElementById('ms-fact').textContent = ms.fact;
  document.getElementById('milestone').style.opacity = '1';
  milestoneTimer = 220;
  playMilestone();
}

// Audio
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playBoost() {
  try { const a=getAudio(),o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.setValueAtTime(440,a.currentTime);o.frequency.exponentialRampToValueAtTime(880,a.currentTime+0.08);g.gain.setValueAtTime(0.1,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.1);o.connect(g).connect(a.destination);o.start();o.stop(a.currentTime+0.1); } catch(e){}
}
function playHit() {
  try { const a=getAudio(),o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.setValueAtTime(200,a.currentTime);o.frequency.exponentialRampToValueAtTime(60,a.currentTime+0.2);g.gain.setValueAtTime(0.15,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.25);o.connect(g).connect(a.destination);o.start();o.stop(a.currentTime+0.25); } catch(e){}
}
function playMilestone() {
  try { const a=getAudio();[523,659,784].forEach((f,i)=>{const o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,a.currentTime+i*0.12);g.gain.linearRampToValueAtTime(0.1,a.currentTime+i*0.12+0.05);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+i*0.12+0.3);o.connect(g).connect(a.destination);o.start(a.currentTime+i*0.12);o.stop(a.currentTime+i*0.12+0.3);}); } catch(e){}
}

// Input
function boost() {
  if (!running || gameOver) return;
  shipVY = CONFIG.BOOST;
  playBoost();
}
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); boost(); }
});
document.addEventListener('touchstart', e => { if (running) { e.preventDefault(); boost(); } }, { passive: false });
document.addEventListener('mousedown', e => { if (running && !e.target.closest('.btn')) boost(); });

// Game loop
function loop() {
  if (!running || gameOver) return;

  // Physics
  shipVY += CONFIG.GRAVITY;
  shipY += shipVY;

  // Speed ramp
  speed = Math.min(CONFIG.MAX_SPEED, CONFIG.INITIAL_SPEED + distance * CONFIG.SPEED_RAMP);
  distance += speed * CONFIG.MILES_PER_FRAME;

  // Move ship
  shipEl.style.left = (W() * CONFIG.SHIP_X_PCT - CONFIG.SHIP_SIZE / 2) + 'px';
  shipEl.style.top = (shipY - CONFIG.SHIP_SIZE / 2) + 'px';

  // Invincible blink
  if (Date.now() < invincibleUntil) {
    shipEl.classList.add('invincible');
  } else {
    shipEl.classList.remove('invincible');
  }

  // Move obstacles
  for (const ob of obstacles) {
    ob.x -= speed;
    ob.topEl.style.left = ob.x + 'px';
    ob.botEl.style.left = ob.x + 'px';
  }

  // Remove off-screen, spawn new
  while (obstacles.length > 0 && obstacles[0].x + CONFIG.OBS_WIDTH < 0) {
    const old = obstacles.shift();
    old.topEl.remove();
    old.botEl.remove();
  }
  const last = obstacles[obstacles.length - 1];
  if (!last || last.x < W() - CONFIG.OBS_SPACING + 50) {
    createObstacle(W() + 50);
  }

  // Collision
  if (checkCollision()) {
    lives--;
    updateLives();
    playHit();
    if (lives <= 0) { endGame(); return; }
    invincibleUntil = Date.now() + CONFIG.INVINCIBLE_MS;
    shipVY = CONFIG.BOOST * 0.4;
  }

  // Milestones
  if (milestoneTimer > 0) {
    milestoneTimer--;
    if (milestoneTimer <= 30) document.getElementById('milestone').style.opacity = String(milestoneTimer / 30);
  }
  checkMilestones();

  // HUD
  distEl.textContent = formatDist(distance);

  animId = requestAnimationFrame(loop);
}

function endGame() {
  gameOver = true;
  running = false;
  shipEl.classList.remove('invincible');

  if (distance > bestScore) {
    bestScore = distance;
    localStorage.setItem('gravityDodgeBest', String(Math.floor(distance)));
  }

  overlay.innerHTML = `
    <h1 style="color:#ed7c5a;">Game Over</h1>
    <p id="game-over-stats">${formatDist(distance)}</p>
    <p id="game-over-best">Best: ${formatDist(bestScore)}</p>
    <button class="btn" id="restart-btn">Play Again</button>
    <a href="/learn" class="btn btn-secondary" style="margin-top:8px;">Back to Games</a>
  `;
  overlay.style.display = 'flex';
  document.getElementById('restart-btn').addEventListener('click', startGame);

  // Track
  if (window._playId) {
    const dur = Math.floor((Date.now() - window._playStart) / 1000);
    fetch('/api/track/play-end', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ playId: window._playId, completed: false, durationSeconds: dur })
    }).catch(()=>{});
  }
}

function startGame() {
  overlay.style.display = 'none';
  init();
  running = true;
  cancelAnimationFrame(animId);
  loop();

  window._playStart = Date.now();
  fetch('/api/track/play-start', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ gameTitle: 'Gravity Dodge' })
  }).then(r=>r.json()).then(d=>{ window._playId = d.playId; }).catch(()=>{});
}

document.getElementById('start-btn').addEventListener('click', startGame);
</script>
</body>
</html>
