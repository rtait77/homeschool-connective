<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cover Layout Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    font-family: 'Nunito', sans-serif;
    background: #0d1b3e;
    overflow: hidden;
  }

  .screen {
    position: fixed; inset: 0;
    background: url('/space-bg.png') center center / cover no-repeat;
    display: flex;
    align-items: center;
  }

  /* ── Arc SVG (full screen, behind everything) ── */
  .arc-svg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
    overflow: visible;
  }

  /* ── Main layout ── */
  .cover-layout {
    position: relative;
    z-index: 2;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
  }

  /* ── Mars image (left ~55%) ── */
  .mars-wrap {
    flex: 0 0 55%;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
  }
  .mars-img {
    width: min(512px, 74%);
    height: auto;
    display: block;
    filter: drop-shadow(0 0 50px rgba(180, 70, 20, 0.5));
  }

  /* ── Right side ── */
  .cover-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding-right: 4%;
    text-align: center;
  }

  .cover-title {
    font-size: clamp(2.2rem, 4.8vw, 3.8rem);
    font-weight: 900;
    color: #ffffff;
    line-height: 1.1;
    margin-bottom: 18px;
  }

  .cover-rule {
    width: 85%;
    height: 2px;
    background: rgba(255,255,255,0.5);
    border-radius: 2px;
    margin-bottom: 24px;
  }

  /* ── Button group — green overlaps left of red pill ── */
  .btn-group {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  /* Audio button — overlaps left edge of start button */
  .audio-btn {
    width: 56px; height: 56px;
    background: #21c593;
    border: none;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
    margin-right: -20px;
    animation: audioPulse 2s ease-in-out infinite;
    box-shadow: 0 2px 12px rgba(33,197,147,0.5);
  }
  .audio-btn svg { width: 24px; height: 24px; fill: white; }

  @keyframes audioPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(33, 197, 147, 0.65); }
    50%       { box-shadow: 0 0 0 14px rgba(33, 197, 147, 0); }
  }

  /* START button — pill shape, green circle overlaps left */
  .start-btn {
    background: #d92343;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 15px 44px 15px 44px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.25rem;
    font-weight: 900;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(217, 35, 67, 0.5);
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index: 1;
  }
  .start-btn:hover {
    transform: scale(1.04);
    box-shadow: 0 6px 28px rgba(217, 35, 67, 0.7);
  }
  .start-btn:active { transform: scale(0.97); }

  /* Arrow circle on right of start button */
  .start-arrow {
    width: 34px; height: 34px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .start-arrow svg { width: 18px; height: 18px; fill: white; }

  /* ── Rocket SVG — flame end aligns with arc endpoint ── */
  .arc-rocket {
    position: absolute;
    z-index: 3;
    /* flame is ~10% from left of SVG, 50% from top */
    /* arc ends at ~74% x, 28% y — offset so flame sits there */
    left: 62%;
    top: 20%;
    pointer-events: none;
    /* nose points right-down, flame points left-up, matching arc direction */
    transform: rotate(22deg);
    transform-origin: 10% 50%;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5));
  }
  .arc-rocket svg {
    width: clamp(220px, 26vw, 340px);
    height: auto;
  }

  /* ── Image credit ── */
  .image-credit {
    position: absolute;
    bottom: 16px; left: 20px;
    z-index: 3;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="screen">

  <!-- Simple clean arc — starts bottom-left off-screen, arcs over top of Mars, ends at rocket top-right -->
  <svg class="arc-svg" viewBox="0 0 1000 620" preserveAspectRatio="none">
    <path
      d="M -40 530 Q 220 -60 760 185"
      fill="none"
      stroke="white"
      stroke-width="11"
      stroke-dasharray="28,18"
      stroke-linecap="round"
      opacity="0.9"
    />
  </svg>

  <!-- Inline SVG rocket — flame on left aligns with arc endpoint -->
  <div class="arc-rocket">
    <svg viewBox="0 0 280 100" xmlns="http://www.w3.org/2000/svg" overflow="visible">
      <defs>
        <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#e8eef5"/>
          <stop offset="35%" stop-color="#c8d4e0"/>
          <stop offset="65%" stop-color="#8fa8c0"/>
          <stop offset="100%" stop-color="#6a8aa0"/>
        </linearGradient>
        <linearGradient id="noseGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f0f4f8"/>
          <stop offset="100%" stop-color="#a0b8cc"/>
        </linearGradient>
        <linearGradient id="nozzleGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#555"/>
          <stop offset="100%" stop-color="#222"/>
        </linearGradient>
        <radialGradient id="flameGrad" cx="85%" cy="50%" r="80%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
          <stop offset="25%" stop-color="#ffe066" stop-opacity="1"/>
          <stop offset="55%" stop-color="#ff7a1a" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#ff3a00" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="winGrad" cx="35%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#a8e4ff"/>
          <stop offset="100%" stop-color="#1a6fa8"/>
        </radialGradient>
      </defs>

      <!-- FLAME (behind body) -->
      <ellipse cx="62" cy="50" rx="48" ry="18" fill="url(#flameGrad)" opacity="0.95"/>
      <ellipse cx="52" cy="50" rx="30" ry="11" fill="#ffe566" opacity="0.6"/>
      <ellipse cx="46" cy="50" rx="18" ry="7" fill="#ffffff" opacity="0.7"/>

      <!-- ENGINE NOZZLE -->
      <path d="M 95 38 L 88 28 L 88 72 L 95 62 Z" fill="url(#nozzleGrad)"/>
      <ellipse cx="95" cy="50" rx="5" ry="12" fill="#333"/>

      <!-- MAIN BODY -->
      <rect x="95" y="33" width="130" height="34" rx="4" fill="url(#bodyGrad)"/>
      <rect x="98" y="34" width="124" height="5" rx="2" fill="rgba(255,255,255,0.4)"/>

      <!-- RED ACCENT STRIPE -->
      <rect x="120" y="33" width="22" height="34" fill="#d92343" opacity="0.9"/>
      <rect x="121" y="34" width="20" height="4" fill="rgba(255,255,255,0.3)"/>

      <!-- PANEL LINES -->
      <line x1="155" y1="34" x2="155" y2="66" stroke="#7a9ab0" stroke-width="0.8" opacity="0.7"/>
      <line x1="185" y1="34" x2="185" y2="66" stroke="#7a9ab0" stroke-width="0.8" opacity="0.7"/>
      <line x1="210" y1="34" x2="210" y2="66" stroke="#7a9ab0" stroke-width="0.8" opacity="0.7"/>

      <!-- PORTHOLE WINDOW -->
      <circle cx="170" cy="50" r="10" fill="#1a4a6a"/>
      <circle cx="170" cy="50" r="9" fill="url(#winGrad)"/>
      <circle cx="166" cy="46" r="3" fill="rgba(255,255,255,0.5)"/>
      <circle cx="170" cy="50" r="10" fill="none" stroke="#8ab0cc" stroke-width="1.5"/>

      <!-- NOSE CONE -->
      <path d="M 225 33 Q 278 38 280 50 Q 278 62 225 67 Z" fill="url(#noseGrad)"/>
      <path d="M 226 35 Q 268 40 270 47" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>

      <!-- DELTA FINS -->
      <path d="M 105 67 L 98 88 L 118 67 Z" fill="#d92343"/>
      <path d="M 106 67 L 100 85 L 116 67 Z" fill="#ff4060" opacity="0.5"/>
      <path d="M 105 33 L 98 12 L 118 33 Z" fill="#d92343"/>
      <path d="M 106 33 L 100 15 L 116 33 Z" fill="#ff4060" opacity="0.5"/>

      <!-- RIVETS -->
      <circle cx="145" cy="36" r="1.5" fill="#8ab0cc"/>
      <circle cx="145" cy="64" r="1.5" fill="#8ab0cc"/>
      <circle cx="200" cy="36" r="1.5" fill="#8ab0cc"/>
      <circle cx="200" cy="64" r="1.5" fill="#8ab0cc"/>
    </svg>
  </div>

  <!-- Main layout -->
  <div class="cover-layout">

    <!-- Mars (no background, just the planet PNG) -->
    <div class="mars-wrap">
      <img src="/mars.png" alt="Mars" class="mars-img" />
    </div>

    <!-- Right: title, rule, buttons -->
    <div class="cover-right">
      <div class="cover-title">All About Mars</div>
      <div class="cover-rule"></div>
      <div class="btn-group">
        <button class="audio-btn" title="Play narration">
          <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        </button>
        <button class="start-btn">START</button>
      </div>
    </div>

  </div>

  <div class="image-credit">· Image Credit: NASA</div>

  <!-- Music toggle button -->
  <button class="music-btn" id="music-btn" onclick="toggleMusic()" title="Toggle background music">
    <svg id="music-icon" viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
  </button>

  <!-- Audio elements -->
  <audio id="bg-music" src="/puzzle-bg-music.mp3" loop></audio>
  <audio id="start-audio" src="/start.mp3"></audio>

</div>

<style>
  .music-btn {
    position: absolute;
    bottom: 16px; right: 16px;
    z-index: 10;
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
  }
  .music-btn:hover { background: rgba(255,255,255,0.25); }
  .music-btn svg { width: 20px; height: 20px; fill: white; }
  .music-btn.muted { opacity: 0.45; }
</style>

<script>
  const bgMusic = document.getElementById('bg-music');
  const startAudio = document.getElementById('start-audio');
  const musicBtn = document.getElementById('music-btn');
  const musicIcon = document.getElementById('music-icon');
  let musicOn = false;

  // Try autoplay on first interaction if blocked
  bgMusic.volume = 0.35;
  const tryAutoplay = bgMusic.play();
  if (tryAutoplay) {
    tryAutoplay.then(() => {
      musicOn = true;
    }).catch(() => {
      // blocked — wait for first click on page
      document.addEventListener('click', () => {
        if (!musicOn) { bgMusic.play(); musicOn = true; }
      }, { once: true });
    });
  }

  function toggleMusic() {
    if (musicOn) {
      bgMusic.pause();
      musicOn = false;
      musicBtn.classList.add('muted');
      // swap to muted icon
      musicIcon.innerHTML = '<path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
    } else {
      bgMusic.play();
      musicOn = true;
      musicBtn.classList.remove('muted');
      musicIcon.innerHTML = '<path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>';
    }
  }

  // Green audio button plays start.mp3
  document.querySelector('.audio-btn').addEventListener('click', () => {
    startAudio.currentTime = 0;
    startAudio.play();
  });
</script>

</body>
</html>
