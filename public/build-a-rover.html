<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build a Rover!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #1a0a08;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  /* ── 16:9 stage ── */
  .stage {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100vw;
    height: 56.25vw;
    max-height: 100vh;
    max-width: 177.78vh;
    background: url('/mars-surface-bg.jpg') center/cover no-repeat;
    overflow: hidden;
  }

  /* gradient overlay so left panel reads cleanly */
  .stage::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to right,
      rgba(8,4,2,0.82) 0%,
      rgba(8,4,2,0.72) 36%,
      rgba(8,4,2,0.18) 52%,
      transparent 68%
    );
    z-index: 1;
  }

  /* ── Left panel ── */
  .panel {
    position: absolute;
    top: 0; left: 0;
    width: 38%;
    height: 100%;
    z-index: 2;
    padding: 1.6% 1.8% 1.4% 2.2%;
    display: flex;
    flex-direction: column;
    gap: 0.6%;
  }

  .panel-title {
    font-size: 2.1vw;
    font-weight: 900;
    color: #ed7c5a;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    line-height: 1.1;
    flex-shrink: 0;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 0.5vw;
    flex-shrink: 0;
  }

  .progress-dot {
    width: 1.1vw; height: 1.1vw;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    border: 0.14vw solid rgba(255,255,255,0.35);
    transition: all 0.35s;
    flex-shrink: 0;
  }
  .progress-dot.done {
    background: #ed7c5a;
    border-color: #ed7c5a;
    box-shadow: 0 0 7px rgba(237,124,90,0.7);
  }
  .progress-label {
    font-size: 0.95vw;
    font-weight: 700;
    color: rgba(255,255,255,0.55);
    margin-left: 0.3vw;
  }

  /* ── Category cards ── */
  .categories {
    display: flex;
    flex-direction: column;
    gap: 0.55%;
    flex: 1;
    min-height: 0;
  }

  .category {
    background: rgba(8,16,32,0.78);
    border-radius: 0.7vw;
    border: 0.12vw solid rgba(255,255,255,0.1);
    padding: 0.55vw 0.7vw 0.5vw;
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    transition: border-color 0.3s;
  }
  .category.complete {
    border-color: rgba(237,124,90,0.55);
  }

  .cat-header {
    display: flex;
    align-items: center;
    margin-bottom: 0.4vw;
    flex-shrink: 0;
  }
  .cat-icon { font-size: 1vw; margin-right: 0.3vw; }
  .cat-title {
    font-size: 1vw;
    font-weight: 800;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .cat-check {
    margin-left: auto;
    font-size: 0.9vw;
    color: #ed7c5a;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .category.complete .cat-check { opacity: 1; }

  /* ── Option thumbnails ── */
  .options {
    display: flex;
    gap: 0.6vw;
    flex: 1;
    min-height: 0;
  }

  .option {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    border-radius: 0.55vw;
    border: 0.14vw solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.04);
    padding: 0.3vw 0.2vw 0.25vw;
    transition: border-color 0.18s, background 0.18s, transform 0.15s;
    min-height: 0;
    overflow: hidden;
  }
  .option:hover {
    border-color: rgba(85,182,202,0.65);
    background: rgba(85,182,202,0.1);
    transform: translateY(-0.15vw);
  }
  .option.selected {
    border-color: #ed7c5a;
    background: rgba(237,124,90,0.16);
    box-shadow: 0 0 0.6vw rgba(237,124,90,0.4);
  }
  .option svg {
    width: 100%;
    flex: 1;
    min-height: 0;
    overflow: visible;
  }
  .option-label {
    font-size: 0.7vw;
    font-weight: 700;
    color: rgba(255,255,255,0.65);
    text-align: center;
    margin-top: 0.15vw;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .option.selected .option-label { color: #ed7c5a; }

  /* ── Preview area ── */
  .preview-area {
    position: absolute;
    top: 0; left: 36%;
    width: 64%; height: 100%;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .preview-label {
    font-size: 1.5vw;
    font-weight: 800;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 2px 10px rgba(0,0,0,0.7);
    margin-bottom: 0.8vw;
    letter-spacing: 0.04em;
  }

  .rover-stage {
    position: relative;
    width: 82%;
  }
  .rover-stage svg#rover-svg {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 6px 24px rgba(0,0,0,0.5));
    transition: transform 0s;
  }

  /* ── Dust clouds ── */
  .dust-container {
    position: absolute;
    bottom: 4%;
    right: 2%;
    width: 35%;
    height: 42%;
    pointer-events: none;
    opacity: 0;
  }

  /* ── Instruction text ── */
  .instruction {
    font-size: 0.9vw;
    color: rgba(255,255,255,0.45);
    font-weight: 700;
    margin-top: 0.6vw;
    text-align: center;
    letter-spacing: 0.03em;
  }

  /* ── Launch button ── */
  #launch-btn {
    position: absolute;
    bottom: 5.5%;
    left: 68%;
    transform: translateX(-50%);
    z-index: 10;
    background: linear-gradient(135deg, #ed7c5a 0%, #d95f36 100%);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 1.8vw;
    font-weight: 900;
    padding: 0.7vw 2.2vw;
    border-radius: 99px;
    border: none;
    cursor: pointer;
    box-shadow: 0 0.3vw 1.5vw rgba(237,124,90,0.55);
    letter-spacing: 0.04em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s, box-shadow 0.2s;
  }
  #launch-btn.visible {
    opacity: 1;
    pointer-events: auto;
    animation: pulse-launch 1.6s ease-in-out infinite;
  }
  @keyframes pulse-launch {
    0%,100% { box-shadow: 0 0.3vw 1.5vw rgba(237,124,90,0.55); transform: translateX(-50%) scale(1); }
    50%      { box-shadow: 0 0.4vw 2.5vw rgba(237,124,90,0.85); transform: translateX(-50%) scale(1.05); }
  }
  #launch-btn:hover:not(:disabled) {
    animation: none;
    transform: translateX(-50%) scale(1.08);
    box-shadow: 0 0.4vw 2.8vw rgba(237,124,90,0.9);
  }
  #launch-btn:disabled { cursor: default; }

  /* ── Home button ── */
  .home-btn {
    position: absolute;
    top: 3%;
    right: 2%;
    z-index: 20;
    background: rgba(8,16,32,0.7);
    border: 0.12vw solid rgba(255,255,255,0.2);
    border-radius: 99px;
    color: rgba(255,255,255,0.75);
    font-family: 'Nunito', sans-serif;
    font-size: 0.9vw;
    font-weight: 800;
    padding: 0.35vw 1vw;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.2s, color 0.2s;
  }
  .home-btn:hover {
    background: rgba(85,182,202,0.25);
    color: #fff;
  }

  /* ── Part-selected pop animation ── */
  @keyframes svg-pop {
    0%   { transform: scale(1); }
    45%  { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
  .popping { animation: svg-pop 0.28s ease-out; }

  /* ── Dust cloud puff ── */
  @keyframes dust-puff {
    0%   { opacity: 0; transform: scale(0.2) translate(20px, 20px); }
    25%  { opacity: 0.85; }
    100% { opacity: 0; transform: scale(1.6) translate(-10px, -30px); }
  }
</style>
</head>

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
const selected = { body: null, wheels: null, camera: null, arm: null, antenna: null };

// ─────────────────────────────────────────────
//  BUILD PANEL
// ─────────────────────────────────────────────
function buildPanel() {
  const container = document.getElementById('categories-container');
  CATEGORIES.forEach((cat, catIdx) => {
    const parts = PARTS[cat.id];
    const card = document.createElement('div');
    card.className = 'category';
    card.id = 'cat-' + cat.id;
    card.innerHTML = `
      <div class="cat-header">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-title">${cat.label}</span>
        <span class="cat-check">✓</span>
      </div>
      <div class="options">
        ${parts.map((part, pi) => `
          <div class="option" id="opt-${cat.id}-${pi}" data-cat="${cat.id}" data-idx="${pi}" onclick="selectPart('${cat.id}',${pi})">
            ${part.thumb}
            <span class="option-label">${part.name}</span>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(card);
  });
}

// ─────────────────────────────────────────────
//  SELECT A PART
// ─────────────────────────────────────────────
function selectPart(catId, idx) {
  selected[catId] = idx;

  // Update option highlight
  document.querySelectorAll(`[data-cat="${catId}"]`).forEach(el => el.classList.remove('selected'));
  document.getElementById(`opt-${catId}-${idx}`).classList.add('selected');

  // Mark category done
  document.getElementById('cat-' + catId).classList.add('complete');

  // Update rover SVG
  updateRoverPart(catId, idx);

  // Pop animation on rover
  const svg = document.getElementById('rover-svg');
  svg.classList.remove('popping');
  void svg.offsetWidth; // reflow
  svg.classList.add('popping');
  setTimeout(() => svg.classList.remove('popping'), 300);

  updateProgress();
}

// ─────────────────────────────────────────────
//  UPDATE ROVER ASSEMBLY
// ─────────────────────────────────────────────
function updateRoverPart(catId, idx) {
  const part = PARTS[catId][idx];

  // Inject SVG into the rover group
  document.getElementById('group-' + catId).innerHTML = part.assembly;

  // Hide the placeholder for this group
  const ph = document.getElementById('ph-' + catId);
  if (ph) ph.style.display = 'none';

  // Update chassis to match body
  if (catId === 'body') {
    const chassis = document.getElementById('group-chassis');
    const x1 = part.cx1, x2 = part.cx2;
    chassis.innerHTML = `<rect x="${x1}" y="196" width="${x2 - x1}" height="10" rx="4" fill="#667788"/>`;
  }
}

// ─────────────────────────────────────────────
//  UPDATE PROGRESS
// ─────────────────────────────────────────────
function updateProgress() {
  const count = Object.values(selected).filter(v => v !== null).length;

  CATEGORIES.forEach((cat, idx) => {
    if (selected[cat.id] !== null) {
      document.getElementById('dot-' + idx).classList.add('done');
    }
  });

  if (count < 5) {
    document.getElementById('progress-label').textContent = `${count} of 5 parts chosen`;
  } else {
    document.getElementById('progress-label').textContent = 'All parts selected — ready!';
    document.getElementById('instruction-text').textContent = 'Your rover is ready. Hit launch! 🚀';
    document.getElementById('launch-btn').classList.add('visible');
  }
}

// ─────────────────────────────────────────────
//  LAUNCH
// ─────────────────────────────────────────────
document.getElementById('launch-btn').addEventListener('click', function() {
  const btn = this;
  btn.disabled = true;
  btn.style.animation = 'none';
  btn.textContent = '🚀 Launching!';

  // Drive rover off right side
  const roverStage = document.getElementById('rover-stage');
  roverStage.style.transition = 'transform 1.9s cubic-bezier(0.4, 0, 1, 1)';
  roverStage.style.transform = 'translateX(180%)';

  // Show dust cloud behind it
  spawnDust();

  setTimeout(() => {
    window.location.href = '/lesson-complete.html?lesson=build-a-rover';
  }, 2300);
});

// ─────────────────────────────────────────────
//  DUST CLOUD
// ─────────────────────────────────────────────
function spawnDust() {
  const dustSvg = document.getElementById('dust-svg');
  let html = '';
  const colors = ['rgba(205,155,100,', 'rgba(185,135,85,', 'rgba(220,170,115,', 'rgba(160,110,70,'];
  for (let i = 0; i < 18; i++) {
    const x   = 10  + Math.random() * 200;
    const y   = 30  + Math.random() * 120;
    const r   = 6   + Math.random() * 32;
    const c   = colors[Math.floor(Math.random() * colors.length)];
    const op  = (0.25 + Math.random() * 0.55).toFixed(2);
    const delay = (Math.random() * 0.4).toFixed(2);
    html += `<circle cx="${x}" cy="${y}" r="${r}" fill="${c}${op})"
      style="animation: dust-puff ${(1.2 + Math.random()).toFixed(1)}s ${delay}s ease-out forwards; opacity:0"/>`;
  }
  dustSvg.innerHTML = html;
  dustSvg.style.opacity = '1';
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
buildPanel();
