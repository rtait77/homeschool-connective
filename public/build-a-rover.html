<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build a Rover!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #1a0a08;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  /* ── 16:9 stage ── */
  .stage {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100vw;
    height: 56.25vw;
    max-height: 100vh;
    max-width: 177.78vh;
    background: url('/mars-surface-bg.jpg') center/cover no-repeat;
    overflow: hidden;
  }

  .stage::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to right,
      rgba(8,4,2,0.82) 0%,
      rgba(8,4,2,0.72) 36%,
      rgba(8,4,2,0.18) 52%,
      transparent 68%
    );
    z-index: 1;
  }

  /* ── Left panel — centered vertically ── */
  .panel {
    position: absolute;
    top: 50%; left: 0;
    transform: translateY(-50%);
    width: 38%;
    height: 88%;
    z-index: 2;
    padding: 1.6% 1.8% 1.4% 2.2%;
    display: flex;
    flex-direction: column;
    gap: 0.6%;
  }

  .panel-title {
    font-size: 2.1vw;
    font-weight: 900;
    color: #ed7c5a;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    line-height: 1.1;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 0.5vw;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 0.5vw;
    flex-shrink: 0;
  }

  .progress-dot {
    width: 1.1vw; height: 1.1vw;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    border: 0.14vw solid rgba(255,255,255,0.35);
    transition: all 0.35s;
    flex-shrink: 0;
  }
  .progress-dot.done {
    background: #ed7c5a;
    border-color: #ed7c5a;
    box-shadow: 0 0 7px rgba(237,124,90,0.7);
  }
  .progress-label {
    font-size: 0.95vw;
    font-weight: 700;
    color: rgba(255,255,255,0.55);
    margin-left: 0.3vw;
  }

  /* ── Category cards ── */
  .categories {
    display: flex;
    flex-direction: column;
    gap: 0.55%;
    flex: 1;
    min-height: 0;
  }

  .category {
    background: rgba(8,16,32,0.78);
    border-radius: 0.7vw;
    border: 0.12vw solid rgba(255,255,255,0.1);
    padding: 0.55vw 0.7vw 0.5vw;
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    transition: border-color 0.3s;
  }
  .category.complete {
    border-color: rgba(237,124,90,0.55);
  }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 0.35vw;
    margin-bottom: 0.4vw;
    flex-shrink: 0;
  }
  .cat-icon { font-size: 1vw; }
  .cat-title {
    font-size: 1vw;
    font-weight: 800;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .cat-check {
    margin-left: auto;
    font-size: 0.9vw;
    color: #ed7c5a;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .category.complete .cat-check { opacity: 1; }

  /* ── Option thumbnails ── */
  .options {
    display: flex;
    gap: 0.6vw;
    flex: 1;
    min-height: 0;
  }

  .option {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    border-radius: 0.55vw;
    border: 0.14vw solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.04);
    padding: 0.3vw 0.2vw 0.25vw;
    transition: border-color 0.18s, background 0.18s, transform 0.15s;
    min-height: 0;
    overflow: hidden;
  }
  .option:hover {
    border-color: rgba(85,182,202,0.65);
    background: rgba(85,182,202,0.08);
    transform: scale(0.94);
  }
  .option.selected {
    border-color: #ed7c5a;
    background: rgba(237,124,90,0.16);
    box-shadow: 0 0 0.6vw rgba(237,124,90,0.4);
  }
  .option svg {
    width: 100%;
    flex: 1;
    min-height: 0;
    overflow: visible;
  }

  /* ── Audio image button ── */
  .audio-img {
    width: 2.6vw;
    height: 2.6vw;
    max-width: 34px;
    max-height: 34px;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.15s;
    object-fit: contain;
    display: block;
  }
  .audio-img:hover { transform: scale(0.9); }
  .audio-img-sm {
    width: 1.9vw;
    height: 1.9vw;
    max-width: 25px;
    max-height: 25px;
  }
  /* Overlap: audio img overlaps left edge of red button */
  .audio-img-overlap {
    margin-right: -0.8vw;
    position: relative;
    z-index: 1;
  }
  /* Overlap: audio img overlaps right edge of red button */
  .audio-img-overlap-right {
    margin-left: -0.8vw;
    position: relative;
    z-index: 1;
  }

  /* ── Back to Map button (absolute top-LEFT of stage) ── */
  #back-to-map-row {
    position: absolute;
    top: 3%;
    left: 2%;
    z-index: 10;
    display: flex;
    align-items: center;
  }

  /* ── Preview area ── */
  .preview-area {
    position: absolute;
    top: 0; left: 36%;
    width: 64%; height: 100%;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2% 2% 1.5%;
  }

  /* ── Nav button (Back to Map) ── */
  .nav-btn {
    background: #d92343;
    border: none;
    border-radius: 99px;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 1vw;
    font-weight: 800;
    padding: 0.4vw 1.1vw 0.4vw 1.3vw;
    cursor: pointer;
    letter-spacing: 0.03em;
    box-shadow: 0 0.2vw 0.8vw rgba(217,35,67,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .nav-btn:hover {
    transform: scale(0.93);
    box-shadow: 0 0.15vw 0.5vw rgba(217,35,67,0.3);
  }

  /* ── Launch row (absolutely centered just above the rover) ── */
  #launch-row {
    position: absolute;
    bottom: 70%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    display: flex;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  #launch-row.visible {
    opacity: 1;
    pointer-events: auto;
  }

  /* ── Launch button — round red circle with arrow ── */
  #launch-btn {
    background: #d92343;
    color: #fff;
    width: 5vw;
    height: 5vw;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    box-shadow: 0 0.2vw 1vw rgba(217,35,67,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #launch-btn svg.arrow-icon {
    width: 2.2vw;
    height: 2.2vw;
  }
  #launch-row.visible #launch-btn {
    animation: pulse-launch 1.6s ease-in-out infinite;
  }
  @keyframes pulse-launch {
    0%,100% { box-shadow: 0 0.2vw 1vw rgba(217,35,67,0.5); transform: scale(1); }
    50%      { box-shadow: 0 0.3vw 2vw rgba(217,35,67,0.9); transform: scale(1.08); }
  }
  #launch-row.visible #launch-btn .arrow-icon {
    animation: arrow-nudge 1.6s ease-in-out infinite;
  }
  @keyframes arrow-nudge {
    0%,100% { transform: translateX(0); }
    50%      { transform: translateX(0.35vw); }
  }
  #launch-btn:hover:not(:disabled) {
    animation: none;
    transform: scale(0.93);
    box-shadow: 0 0.15vw 0.6vw rgba(217,35,67,0.4);
  }
  #launch-btn:hover:not(:disabled) .arrow-icon { animation: none; }
  #launch-btn:disabled { cursor: default; }

  /* ── Rover stage ── */
  .rover-stage {
    position: relative;
    width: 88%;
    flex: 1;
    display: flex;
    align-items: center;
    z-index: 2;
  }
  .rover-stage svg#rover-svg {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 6px 24px rgba(0,0,0,0.5));
  }

  /* ── Dust clouds (behind rover, absolute in preview-area) ── */
  #dust-svg {
    position: absolute;
    bottom: 6%;
    left: 8%;
    width: 45%;
    height: 44%;
    pointer-events: none;
    opacity: 0;
    z-index: 1;
  }

  /* ── Part-selected pop animation ── */
  @keyframes svg-pop {
    0%   { transform: scale(1); }
    45%  { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
  .popping { animation: svg-pop 0.28s ease-out; }

  /* ── Dust cloud puff ── */
  @keyframes dust-puff {
    0%   { opacity: 0; transform: scale(0.2) translate(20px, 20px); }
    25%  { opacity: 0.85; }
    100% { opacity: 0; transform: scale(1.6) translate(-10px, -30px); }
  }
</style>
</head>
<body>
<div class="stage">

  <!-- ── BACK TO MAP (absolute top-LEFT) ── -->

    <button class="nav-btn" onclick="window.location.href='/lesson-mars-map.html'">← Back to Map</button>
    <img src="/audio-button.png" class="audio-img audio-img-overlap-right" onclick="playAudio('map-audio')" title="Listen" alt="audio">
  </div>

  <!-- ── LEFT PANEL ── -->
  <div class="panel">
    <div class="panel-title">

    <div class="progress-row">
      <div class="progress-dot" id="dot-0"></div>
      <div class="progress-dot" id="dot-1"></div>
      <div class="progress-dot" id="dot-2"></div>
      <div class="progress-dot" id="dot-3"></div>
      <span class="progress-label" id="progress-label">Pick 4 parts to build!</span>
    </div>

    <div class="categories" id="categories-container">
      <!-- built by JS -->
    </div>
  </div>

  <!-- ── PREVIEW AREA ── -->
  <div class="preview-area">

    <!-- Launch row (centered, hidden until all 4 parts chosen) -->
    <div id="launch-row">
      <button id="launch-btn">
        <svg class="arrow-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 24 H36 M26 14 L38 24 L26 34" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </button>
    </div>

    <div class="rover-stage" id="rover-stage">

      <!-- Main rover SVG -->
      <svg id="rover-svg" viewBox="0 0 500 270" xmlns="http://www.w3.org/2000/svg">
        <!-- Ground shadow (keep shadow, no dashed line) -->
        <ellipse cx="255" cy="252" rx="148" ry="12" fill="rgba(0,0,0,0.28)"/>

        <!-- Flip wrapper: arm on right (front), no antenna -->
        <g transform="translate(500,0) scale(-1,1)">
          <!-- Layer order: wheels → chassis → arm (behind body) → camera → body (on top) -->
          <g id="group-wheels"></g>
          <g id="group-chassis"></g>
          <g id="group-arm"></g>
          <g id="group-camera"></g>
          <g id="group-body"></g>

          <!-- Placeholder ghost outlines -->
          <g id="ph-wheels">
            <circle cx="178" cy="218" r="20" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
            <circle cx="250" cy="218" r="20" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
            <circle cx="322" cy="218" r="20" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
          </g>
          <g id="ph-arm">
            <line x1="202" y1="162" x2="144" y2="162" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
            <line x1="144" y1="162" x2="144" y2="188" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
          </g>
          <g id="ph-camera">
            <line x1="264" y1="132" x2="264" y2="74" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
            <rect x="250" y="64" width="28" height="18" rx="4" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
          </g>
          <g id="ph-body">
            <rect x="202" y="132" width="96" height="66" rx="7" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
            <text x="250" y="170" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="18" font-family="Nunito" font-weight="900">?</text>
          </g>
        </g>
      </svg>

    </div>

    <!-- Dust cloud (behind rover — z-index 1 vs rover-stage z-index 2) -->
    <svg id="dust-svg" viewBox="0 0 220 160" xmlns="http://www.w3.org/2000/svg"></svg>

  </div>

  <!-- Audio -->
  <audio id="title-audio"  src="/build-your-rover.mp3"></audio>
  <audio id="audio-body"   src="/body.mp3"></audio>
  <audio id="audio-wheels" src="/wheels.mp3"></audio>
  <audio id="audio-camera" src="/camera.mp3"></audio>
  <audio id="audio-arm"    src="/robotic-arm.mp3"></audio>
  <audio id="launch-audio" src="/launch-rover.mp3"></audio>
  <audio id="rover-zoom"   src="/rover-zoom.mp3"></audio>
  <audio id="map-audio"    src="/back to map.mp3"></audio>

</div><!-- end .stage -->

  wheels: '/wheels.mp3',

};

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
const selected = { body: null, wheels: null, camera: null, arm: null };

// ─────────────────────────────────────────────
//  BUILD PANEL
// ─────────────────────────────────────────────
function buildPanel() {
  const container = document.getElementById('categories-container');
  CATEGORIES.forEach((cat) => {
    const parts = PARTS[cat.id];
    const card = document.createElement('div');
    card.className = 'category';
    card.id = 'cat-' + cat.id;
    card.innerHTML = `
      <div class="cat-header">
        <img src="/audio-button.png" class="audio-img audio-img-sm" onclick="playAudio('audio-${cat.id}')" title="Listen" alt="audio">
        <span class="cat-title">${cat.label}</span>
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-check">✓</span>
      </div>
      <div class="options">
        ${parts.map((part, pi) => `
          <div class="option" id="opt-${cat.id}-${pi}" data-cat="${cat.id}" data-idx="${pi}" onclick="selectPart('${cat.id}',${pi})">
            ${part.thumb}
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(card);
  });
}

// ─────────────────────────────────────────────
//  SELECT A PART
// ─────────────────────────────────────────────
function selectPart(catId, idx) {
  selected[catId] = idx;

  document.querySelectorAll(`[data-cat="${catId}"]`).forEach(el => el.classList.remove('selected'));
  document.getElementById(`opt-${catId}-${idx}`).classList.add('selected');
  document.getElementById('cat-' + catId).classList.add('complete');

  updateRoverPart(catId, idx);

  const svg = document.getElementById('rover-svg');
  svg.classList.remove('popping');
  void svg.offsetWidth;
  svg.classList.add('popping');
  setTimeout(() => svg.classList.remove('popping'), 300);

  updateProgress();
}

// ─────────────────────────────────────────────
//  UPDATE ROVER ASSEMBLY
// ─────────────────────────────────────────────
function updateRoverPart(catId, idx) {
  const part = PARTS[catId][idx];
  document.getElementById('group-' + catId).innerHTML = part.assembly;

  const ph = document.getElementById('ph-' + catId);
  if (ph) ph.style.display = 'none';

  if (catId === 'body') {
    const chassis = document.getElementById('group-chassis');
    chassis.innerHTML = `<rect x="${part.cx1}" y="196" width="${part.cx2 - part.cx1}" height="10" rx="4" fill="#667788"/>`;
  }
}

// ─────────────────────────────────────────────
//  UPDATE PROGRESS
// ─────────────────────────────────────────────
function updateProgress() {
  const count = Object.values(selected).filter(v => v !== null).length;

  CATEGORIES.forEach((cat, idx) => {
    if (selected[cat.id] !== null) {
      document.getElementById('dot-' + idx).classList.add('done');
    }
  });

  if (count < 4) {
    document.getElementById('progress-label').textContent = `${count} of 4 parts chosen`;
  } else {
    document.getElementById('progress-label').textContent = `4 of 4 parts chosen`;
    document.getElementById('launch-row').classList.add('visible');
  }
}

// ─────────────────────────────────────────────
//  LAUNCH
// ─────────────────────────────────────────────
document.getElementById('launch-btn').addEventListener('click', function() {
  this.disabled = true;
  this.style.animation = 'none';

  const roverStage = document.getElementById('rover-stage');
  roverStage.style.transition = 'transform 1.9s cubic-bezier(0.4, 0, 1, 1)';
  roverStage.style.transform = 'translateX(180%)';

  playAudio('rover-zoom');
  spawnDust();

  setTimeout(() => {
    window.location.href = '/lesson-complete.html?lesson=build-a-rover';
  }, 2300);
});

// ─────────────────────────────────────────────
//  DUST CLOUD
// ─────────────────────────────────────────────
function spawnDust() {
  const dustSvg = document.getElementById('dust-svg');
  let html = '';
  const colors = ['rgba(205,155,100,', 'rgba(185,135,85,', 'rgba(220,170,115,', 'rgba(160,110,70,'];
  for (let i = 0; i < 18; i++) {
    const x   = 10  + Math.random() * 200;
    const y   = 30  + Math.random() * 120;
    const r   = 6   + Math.random() * 32;
    const c   = colors[Math.floor(Math.random() * colors.length)];
    const op  = (0.25 + Math.random() * 0.55).toFixed(2);
    const delay = (Math.random() * 0.4).toFixed(2);
    html += `<circle cx="${x}" cy="${y}" r="${r}" fill="${c}${op})"
      style="animation: dust-puff ${(1.2 + Math.random()).toFixed(1)}s ${delay}s ease-out forwards; opacity:0"/>`;
  }
  dustSvg.innerHTML = html;
  dustSvg.style.opacity = '1';
}

// ─────────────────────────────────────────────
//  AUDIO
// ─────────────────────────────────────────────
function playAudio(id) {
  const audio = document.getElementById(id);
  if (audio && audio.src && !audio.src.endsWith(window.location.href)) {
    audio.currentTime = 0;
    audio.play();
  }
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
buildPanel();
// Camera is recorded louder — bring it down to match others
document.getElementById('audio-camera').volume = 0.55;
