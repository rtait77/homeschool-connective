<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Asteroid Blast – Inner Planets (Easy)</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: url('/space-bg.png') center/cover no-repeat fixed;
      font-family: 'Nunito', sans-serif;
      color: white;
      overflow: hidden;
      width: 100vw; height: 100vh;
    }
    #stage {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 100vw; height: 56.25vw;
      max-height: 100vh; max-width: 177.78vh;
    }
    @media (max-aspect-ratio: 16/9) {
      #stage { top: 0; transform: translateX(-50%); }
    }

    /* HUD */
    #hud {
      position: absolute;
      top: 2.5%; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 3%;
    }
    #prompt {
      font-size: clamp(13px, 4vw, 32px);
      font-weight: 900;
      text-shadow: 0 0 12px #fff, 0 2px 8px rgba(0,0,0,0.8);
      letter-spacing: 0.03em;
    }
    #prompt span { color: #f9d84a; }
    #lives-display {
      font-size: clamp(18px, 3.5vw, 28px);
      display: flex;
      gap: 4px;
      align-items: center;
    }

    /* Progress bar */
    #progress-bar {
      flex-shrink: 0;
      height: 6px;
      background: rgba(255,255,255,0.15);
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #55b6ca, #a8f0ff);
      transition: width 0.3s;
      width: 0%;
    }

    /* Game container */
    #game-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #game-area {
      position: absolute;
      inset: 0;
    }

        /* Asteroid */
    .asteroid {
      position: absolute;
      cursor: pointer;
      user-select: none;
      transform-origin: center;
      transition: transform 0.08s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .asteroid:hover { transform: scale(1.08); }
    .asteroid.blasting { pointer-events: none; }

    .asteroid-body {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .asteroid-svg {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
    }
    .asteroid-label {
      position: relative;
      font-weight: 900;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      text-align: center;
      z-index: 2;
      white-space: nowrap;
    }

    /* Explosion */
    .explosion {
      position: absolute;
      pointer-events: none;
      z-index: 100;
      transform: translate(-50%, -50%);
    }

    /* Wrong flash */
    .wrong-flash {
      position: absolute;
      pointer-events: none;
      z-index: 100;
      transform: translate(-50%, -50%);
      font-size: clamp(18px, 4.5vw, 36px);
      font-weight: 900;
      color: #ff4444;
      text-shadow: 0 0 10px #ff0000;
      animation: wrongAnim 0.6s ease-out forwards;
    }
    @keyframes wrongAnim {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -120%) scale(1.3); }
    }

    /* Overlay screens */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(5, 10, 30, 0.88);
      z-index: 200;
      text-align: center;
      padding: 24px;
    }
    #overlay h1 {
      font-size: clamp(26px, 6vw, 60px);
      font-weight: 900;
      margin-bottom: 12px;
      line-height: 1.1;
    }
    #overlay p {
      font-size: clamp(15px, 3vw, 28px);
      margin-bottom: 20px;
      color: #c8e6ff;
      line-height: 1.5;
    }
    .btn {
      background: #ed7c5a;
      color: white;
      border: none;
      border-radius: 100px;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(15px, 3vw, 24px);
      font-weight: 900;
      padding: 12px 28px;
      cursor: pointer;
      margin: 4px;
      transition: transform 0.1s, background 0.15s;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover { transform: scale(1.05); background: #d96a47; }
    .btn-secondary {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.25); }

    /* Easy mode badge */
    #easy-badge {
      position: absolute;
      bottom: 3%;
      right: 3%;
      background: rgba(85, 182, 202, 0.25);
      border: 0.15vw solid #55b6ca;
      border-radius: 100px;
      padding: 0.5% 1.5%;
      font-size: 1.3vw;
      font-weight: 800;
      color: #a8f0ff;
    }
  </style>
</head>
<body>
  <div id="header">
    <div id="lives-display"></div>
    <div id="prompt">BLAST THE <span>INNER PLANETS</span>!</div>
    <div id="planet-counter" style="font-size:clamp(12px,3vw,22px);font-weight:800;color:#a8f0ff;text-shadow:0 2px 6px rgba(0,0,0,0.8)">🌍 0 / 4 inner planets</div>
  </div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="game-area"></div>
  <div id="easy-badge">EASY MODE</div>
  <div id="overlay">
    <h1>🚀 Asteroid Blast!</h1>
    <p>Blast only the <strong style="color:#f9d84a">INNER PLANETS</strong>!<br>
    You have 5 lives. It's OK if you miss one — just don't shoot the wrong ones!</p>
    <button class="btn" id="start-btn">START MISSION</button>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────
const CONFIG = {
  easyMode: true,
  startLives: 5,
  spawnInterval: 2200,
  asteroidSize: 10,
};

const CORRECT = ['Mercury','Venus','Earth','Mars'];
const WRONG   = ['Jupiter','Saturn','Uranus','Neptune','Pluto','Moon','Sun','Comet'];

let audioCtx = null;
const audioBuffers = {};

function initAudio() {
  if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  [['correct', '/astroid-crash.mp3'], ['wrong', '/space-sound-teleport.mp3']].forEach(([key, src]) => {
    fetch(src).then(r => r.arrayBuffer())
              .then(buf => audioCtx.decodeAudioData(buf))
              .then(decoded => { audioBuffers[key] = decoded; })
              .catch(() => {});
  });
}

function playSound(key) {
  if (!audioCtx || !audioBuffers[key]) return;
  try {
    const s = audioCtx.createBufferSource();
    s.buffer = audioBuffers[key];
    s.connect(audioCtx.destination);
    s.start(0);
  } catch(e) {}
}

function playCorrect() { playSound('correct'); }
function playWrong()   { playSound('wrong'); }); }

// ─── STATE ────────────────────────────────────────────────────────────────
let lives, score, blasted, gameActive, spawnTimer, topUpTimer, asteroidId, spawnQueue, activeCount, blastedSet;

function buildQueue() {
  const remaining = CORRECT.filter(p => !blastedSet.has(p));
  const shuffled = [...remaining].sort(() => Math.random() - 0.5);
  const queue = [];
  shuffled.forEach(planet => {
    if (Math.random() < 0.5) {
      queue.push({ label: WRONG[Math.floor(Math.random() * WRONG.length)], isCorrect: false });
    }
    queue.push({ label: planet, isCorrect: true });
  });
  return queue;
}

function init() {
  lives = CONFIG.startLives;
  score = 0;
  blasted = 0;
  activeCount = 0;
  gameActive = false;
  asteroidId = 0;
  blastedSet = new Set();
  spawnQueue = buildQueue();
  document.getElementById('game-area').innerHTML = '';
  renderHUD();
}

function renderHUD() {
  const ld = document.getElementById('lives-display');
  ld.innerHTML = '';
  for (let i = 0; i < CONFIG.startLives; i++) {
    const icon = document.createElement('span');
    icon.style.fontSize = 'clamp(18px, 3.5vw, 28px)';
    icon.textContent = i < lives ? '❤️' : '🖤';
    ld.appendChild(icon);
  }
  document.getElementById('progress-fill').style.width = (blasted / CORRECT.length * 100) + '%';
  document.getElementById('planet-counter').textContent = `🌍 ${blasted} / ${CORRECT.length} inner planets`;
}

// ─── ASTEROID SPAWNING ────────────────────────────────────────────────────
function randomBetween(a, b) { return a + Math.random() * (b - a); }

function spawnNext() {
  if (!gameActive || spawnQueue.length === 0) return;
  const { label, isCorrect } = spawnQueue.shift();
  spawnAsteroid(label, isCorrect);
}

function spawnAsteroid(label, isCorrect) {
  activeCount++;
  const id = ++asteroidId;
  const size = randomBetween(CONFIG.asteroidSize * 0.85, CONFIG.asteroidSize * 1.2);
  const topPct = randomBetween(12, 78);
  const fromLeft = Math.random() < 0.5;
  const duration = randomBetween(18, 26); // easy = always slow

  const el = document.createElement('div');
  el.className = 'asteroid';
  el.dataset.id = id;

  el.style.cssText = `
    top: ${topPct}%;
    left: ${fromLeft ? -size : 100 + size}vw;
    width: ${size}vmin;
    height: ${size}vmin;
    z-index: 10;
  `;

  const hue = Math.floor(Math.random() * 40) + 20;
  const sat = Math.floor(Math.random() * 20) + 5;
  const lum = Math.floor(Math.random() * 25) + 25;

  el.innerHTML = `
    <div class="asteroid-body" style="width:${size}vw;height:${size}vw">
      <svg class="asteroid-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,8 78,18 95,42 90,70 68,90 38,95 15,78 8,52 18,25 38,10"
          fill="hsl(${hue},${sat}%,${lum}%)" stroke="hsl(${hue},${sat}%,${lum+15}%)" stroke-width="2"/>
        <circle cx="35" cy="38" r="8" fill="hsl(${hue},${sat}%,${lum-8}%)" opacity="0.7"/>
        <circle cx="65" cy="60" r="5" fill="hsl(${hue},${sat}%,${lum-8}%)" opacity="0.6"/>
        <circle cx="55" cy="30" r="4" fill="hsl(${hue},${sat}%,${lum-5}%)" opacity="0.5"/>
      </svg>
      <span class="asteroid-label" style="font-size:${size * 0.16}vmin">${label}</span>
    </div>
  `;

  el.addEventListener('click', () => onAsteroidClick(el, isCorrect, label));
  document.getElementById('game-area').appendChild(el);

  const startX = fromLeft ? -size : (100 + size);
  const endX   = fromLeft ? (100 + size) : -size;
  const startTime = performance.now();
  const durationMs = duration * 1000;

  function drift(now) {
    if (!gameActive) { el.remove(); activeCount--; return; }
    const pct = (now - startTime) / durationMs;
    if (pct >= 1) {
      // Easy mode: no penalty for missing correct ones
      el.remove();
      activeCount--;
      checkEmpty();
      return;
    }
    el.style.left = (startX + (endX - startX) * pct) + 'vw';
    requestAnimationFrame(drift);
  }
  requestAnimationFrame(drift);
}

function onAsteroidClick(el, isCorrect, label) {
  if (el.classList.contains('blasting')) return;
  el.classList.add('blasting');

  const rect = el.getBoundingClientRect();
  const sr = document.getElementById('game-container').getBoundingClientRect();
  const cx = ((rect.left + rect.width / 2 - sr.left) / sr.width * 100).toFixed(1);
  const cy = ((rect.top + rect.height / 2 - sr.top) / sr.height * 100).toFixed(1);

  if (isCorrect) {
    blasted++;
    blastedSet.add(label);
    playCorrect();
    showExplosion(cx, cy);
    el.remove();
    activeCount--;
    renderHUD();
    if (blasted >= CORRECT.length) { endGame(true); return; }
    checkEmpty();
  } else {
    playWrong();
    loseLife();
    showWrongFlash(cx, cy);
    el.style.outline = '0.3vw solid #ff4444';
    el.style.filter = 'brightness(0.5) saturate(3)';
    setTimeout(() => { el.remove(); activeCount--; checkEmpty(); }, 400);
  }
}

function checkEmpty() {
  if (!gameActive || spawnQueue.length > 0 || activeCount > 0) return;
  if (blasted >= CORRECT.length) { endGame(true); return; }
  if (lives <= 0) { endGame(false); return; }
  spawnQueue = buildQueue();
  clearInterval(spawnTimer);
  spawnNext();
  spawnTimer = setInterval(() => {
    if (!gameActive) return;
    if (spawnQueue.length > 0) spawnNext();
  }, CONFIG.spawnInterval);
}

function loseLife() {
  lives--;
  renderHUD();
  if (lives <= 0) endGame(false);
}

// ─── EFFECTS ──────────────────────────────────────────────────────────────
function showExplosion(cx, cy) {
  const el = document.createElement('div');
  el.className = 'explosion';
  el.style.left = cx + '%';
  el.style.top = cy + '%';
  const count = 8;
  el.innerHTML = `<svg width="12vw" height="12vw" viewBox="0 0 120 120" style="overflow:visible">
    ${Array.from({length:count}, (_,i) => {
      const angle = (i / count) * 360;
      const r = 40 + Math.random() * 20;
      const x = 60 + r * Math.cos(angle * Math.PI / 180);
      const y = 60 + r * Math.sin(angle * Math.PI / 180);
      const colors = ['#f9d84a','#ff9b3f','#ff6b6b','#fff'];
      const c = colors[i % colors.length];
      return `<circle cx="${x}" cy="${y}" r="${3+Math.random()*4}" fill="${c}">
        <animate attributeName="r" from="${3+Math.random()*4}" to="0" dur="0.5s" fill="freeze"/>
        <animate attributeName="opacity" from="1" to="0" dur="0.5s" fill="freeze"/>
      </circle>`;
    }).join('')}
    <text x="60" y="68" text-anchor="middle" font-size="40">💥
      <animate attributeName="opacity" from="1" to="0" dur="0.5s" fill="freeze"/>
    </text>
  </svg>`;
  document.getElementById('game-area').appendChild(el);
  setTimeout(() => el.remove(), 600);
}

function showWrongFlash(cx, cy) {
  const el = document.createElement('div');
  el.className = 'wrong-flash';
  el.style.left = cx + '%';
  el.style.top = cy + '%';
  el.textContent = '✗ WRONG!';
  document.getElementById('game-area').appendChild(el);
  setTimeout(() => el.remove(), 700);
}

// ─── WIN / LOSE ───────────────────────────────────────────────────────────
function endGame(won) {
  gameActive = false;
  clearInterval(spawnTimer);
  clearInterval(topUpTimer);
  document.querySelectorAll('.asteroid').forEach(a => a.remove());

  const overlay = document.getElementById('overlay');
  overlay.innerHTML = won ? `
    <h1>Mission Complete!</h1>
    <p>You blasted all 4 inner planets!<br>Mercury, Venus, Earth, and Mars — the rocky planets closest to the Sun!</p>
    <button class="btn" id="play-again-btn">Play Again</button>
    <a href="/learn" class="btn btn-secondary" style="margin-top:4px">Back to Learn</a>
  ` : `
    <h1>🚀 Mission Failed</h1>
    <p>You blasted <strong style="color:#f9d84a">${blasted} of 4 inner planets</strong>.<br>
    Remember: only blast the <strong>inner planets</strong>!</p>
    <button class="btn" id="play-again-btn">Try Again</button>
    <a href="/learn" class="btn btn-secondary" style="margin-top:4px">Back to Learn</a>
  `;
  overlay.style.display = 'flex';
  document.getElementById('play-again-btn').addEventListener('click', startGame);
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────
function startGame() {
  initAudio();
  init();
  document.getElementById('overlay').style.display = 'none';
  gameActive = true;
  for (let i = 0; i < 3 && spawnQueue.length > 0; i++) spawnNext();
  spawnTimer = setInterval(() => {
    if (!gameActive) return;
    if (spawnQueue.length > 0) spawnNext();
  }, CONFIG.spawnInterval);
  topUpTimer = setInterval(() => {
    if (!gameActive || activeCount > 0) return;
    if (spawnQueue.length > 0) spawnNext();
  }, 400);
}

document.getElementById('start-btn').addEventListener('click', startGame);
init();
</script>
</body>
</html>
