<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Sun Puzzle - Easy</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: url('/space-bg.png') center center / cover no-repeat fixed;
      font-family: 'Nunito', sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      user-select: none;
      -webkit-user-select: none;
    }

    h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      color: #FFD700;
      text-align: center;
      margin-bottom: 14px;
      text-shadow: 0 0 24px rgba(255,215,0,0.35);
    }

    .instructions-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      background: rgba(255,255,255,0.08);
      border-radius: 50px;
      padding: 10px 20px;
      max-width: 640px;
      width: 100%;
    }

    #playBtn {
      background: #ed7c5a;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      min-width: 42px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background 0.15s;
    }
    #playBtn:hover  { background: #d4623f; transform: scale(1.08); }
    #playBtn:active { transform: scale(0.95); }
    #playBtn svg    { width: 18px; height: 18px; fill: white; margin-left: 2px; }

    #musicBtn {
      background: rgba(255,255,255,0.12);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      min-width: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background 0.15s;
      margin-left: auto;
    }
    #musicBtn:hover { background: rgba(255,255,255,0.22); }
    #musicBtn svg   { width: 18px; height: 18px; fill: #ccc; }
    #musicBtn.playing svg { fill: #FFD700; }

    .instructions-text {
      font-size: 0.92rem;
      color: #ddd;
      line-height: 1.45;
    }

    #canvasWrap { position: relative; }
    canvas { display: block; touch-action: none; cursor: default; }

    #confettiCanvas {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 10;
    }

    #resetBtn {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: rgba(5, 10, 26, 0.75);
      border: 3px solid rgba(255,255,255,0.6);
      border-radius: 50%;
      width: 72px;
      height: 72px;
      cursor: pointer;
      z-index: 11;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    #resetBtn.show { display: flex; }
    #resetBtn:hover  { background: rgba(237,124,90,0.85); border-color: white; }
    #resetBtn:active { transform: translate(-50%, -50%) scale(0.93); }
    #resetBtn svg { width: 36px; height: 36px; fill: white; }
    @keyframes popIn {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
  </style>
</head>
<body>

<h1>The Sun Puzzle - Easy</h1>

<div class="instructions-bar">
  <button id="playBtn" title="Play instructions">
    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </button>
  <span class="instructions-text">Drag the pieces to solve the puzzle. When a piece is in the right spot, it will snap into place!</span>
  <button id="musicBtn" title="Toggle music">
    <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
  </button>
</div>

<div id="canvasWrap">
  <canvas id="gameCanvas"></canvas>
  <canvas id="confettiCanvas"></canvas>
  <button id="resetBtn" title="Reset puzzle">
    <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
  </button>
</div>

<audio id="voiceover"  src="/puzzle-easy-instructions.mp3" preload="auto"></audio>
<audio id="snapSound"  src="/puzzle-snap.mp3"              preload="auto"></audio>
<audio id="bgMusic"    src="/puzzle-bg-music.mp3" loop     preload="auto"></audio>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const ROWS = 3, COLS = 3;
const SNAP_DIST = 28;
const TAB_BUMP  = 0.14;

// ─── STATE ────────────────────────────────────────────────────────────────────
let canvas, ctx, img;
let boardW, boardH, pieceW, pieceH;
let pieces = [];
let groups  = {};   // id → Set of piece indices
let nextGID = 0;
let dragging = null;  // { groupId }
let dragLastX = 0, dragLastY = 0;
let maxZ = 0;
let audioCtx = null;

// ─── AUDIO ────────────────────────────────────────────────────────────────────
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playSnap() {
  try { const s = document.getElementById('snapSound'); s.currentTime = 0; s.play().catch(()=>{}); } catch(e){}
}
function playWin() {
  try {
    const ac = getAC();
    [523,659,784,1047,1318].forEach((f,i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = f;
      const t = ac.currentTime + i * 0.13;
      g.gain.setValueAtTime(0.22, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
      o.start(t); o.stop(t + 0.55);
    });
  } catch(e){}
}

// ─── GROUP SYSTEM ─────────────────────────────────────────────────────────────
function createGroup(idx) {
  const id = nextGID++;
  groups[id] = new Set([idx]);
  pieces[idx].groupId = id;
}

function mergeGroups(idA, idB) {
  if (idA === idB) return;
  groups[idB].forEach(i => { pieces[i].groupId = idA; groups[idA].add(i); });
  delete groups[idB];
}

function checkWin() {
  return Object.keys(groups).length === 1;
}

// ─── TAB GENERATION ───────────────────────────────────────────────────────────
function genTabs() {
  const h = [], v = [];
  for (let r = 0; r < ROWS-1; r++) { h[r]=[]; for (let c=0;c<COLS;c++) h[r][c]=Math.random()<.5?1:-1; }
  for (let r = 0; r < ROWS;   r++) { v[r]=[]; for (let c=0;c<COLS-1;c++) v[r][c]=Math.random()<.5?1:-1; }
  return {h,v};
}
function pieceTabs(r, c, {h,v}) {
  return {
    top:    r===0      ? 0 : -h[r-1][c],
    bottom: r===ROWS-1 ? 0 :  h[r][c],
    left:   c===0      ? 0 : -v[r][c-1],
    right:  c===COLS-1 ? 0 :  v[r][c],
  };
}

// ─── JIGSAW PATH ──────────────────────────────────────────────────────────────
function jigsawEdge(c2, x1, y1, x2, y2, type) {
  if (type===0) { c2.lineTo(x2,y2); return; }
  const dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy);
  const px=dy/len, py=-dx/len;
  const hh=len*TAB_BUMP*type;
  const A=.30,B=.42,M=.50,D=.58,E=.70;
  const ax=x1+dx*A,ay=y1+dy*A, bx=x1+dx*B,by=y1+dy*B;
  const mx=x1+dx*M,my=y1+dy*M, dx2=x1+dx*D,dy2=y1+dy*D;
  const ex=x1+dx*E,ey=y1+dy*E;
  c2.lineTo(ax,ay);
  c2.bezierCurveTo(ax+px*hh*.3,ay+py*hh*.3, bx+px*hh,by+py*hh, mx+px*hh*1.1,my+py*hh*1.1);
  c2.bezierCurveTo(dx2+px*hh,dy2+py*hh, ex+px*hh*.3,ey+py*hh*.3, ex,ey);
  c2.lineTo(x2,y2);
}
function makePath(c2, pw, ph, tabs) {
  c2.beginPath(); c2.moveTo(0,0);
  jigsawEdge(c2,  0, 0, pw,  0, tabs.top);
  jigsawEdge(c2, pw, 0, pw, ph, tabs.right);
  jigsawEdge(c2, pw,ph,  0, ph, tabs.bottom);
  jigsawEdge(c2,  0,ph,  0,  0, tabs.left);
  c2.closePath();
}

// ─── HIT TEST ─────────────────────────────────────────────────────────────────
function hitTest(piece, mx, my) {
  const tc = document.createElement('canvas').getContext('2d');
  makePath(tc, pieceW, pieceH, piece.tabs);
  return tc.isPointInPath(mx - piece.x, my - piece.y);
}
function pieceAt(mx, my) {
  const sorted = [...pieces].sort((a,b) => b.zIndex - a.zIndex);
  for (const p of sorted) {
    const buf = Math.max(pieceW,pieceH)*TAB_BUMP*1.5;
    if (mx<p.x-buf||mx>p.x+pieceW+buf||my<p.y-buf||my>p.y+pieceH+buf) continue;
    if (hitTest(p, mx, my)) return p;
  }
  return null;
}

// ─── SNAP LOGIC ───────────────────────────────────────────────────────────────
function trySnap(movedGID) {
  const movedPieces = [...groups[movedGID]];
  const ADJ = [
    { dr:-1, dc: 0, ox: 0,      oy:  pieceH },
    { dr: 1, dc: 0, ox: 0,      oy: -pieceH },
    { dr: 0, dc:-1, ox: pieceW, oy:  0      },
    { dr: 0, dc: 1, ox:-pieceW, oy:  0      },
  ];

  for (const idx of movedPieces) {
    const piece = pieces[idx];
    for (const {dr,dc,ox,oy} of ADJ) {
      const nr = piece.row+dr, nc = piece.col+dc;
      if (nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
      const neighbor = pieces.find(p=>p.row===nr&&p.col===nc);
      if (!neighbor || neighbor.groupId === movedGID) continue;

      const expX = neighbor.x + ox, expY = neighbor.y + oy;
      if (Math.abs(piece.x-expX)<SNAP_DIST && Math.abs(piece.y-expY)<SNAP_DIST) {
        const sdx = expX-piece.x, sdy = expY-piece.y;
        // Move entire moved group to snap position
        groups[movedGID].forEach(i => { pieces[i].x += sdx; pieces[i].y += sdy; });
        // Clamp after snap
        clampGroup(movedGID, 0, 0);
        const nGID = neighbor.groupId;
        mergeGroups(movedGID, nGID);
        playSnap();
        return true;
      }
    }
  }
  return false;
}

// ─── BOUNDS ───────────────────────────────────────────────────────────────────
function clampGroup(gid, dx, dy) {
  const cw = canvas.width, ch = canvas.height;
  const tab = Math.max(pieceW,pieceH)*TAB_BUMP;
  for (const i of groups[gid]) {
    const p = pieces[i];
    if (p.x+dx < -tab)         dx = -tab - p.x;
    if (p.x+dx+pieceW > cw+tab) dx = cw+tab - pieceW - p.x;
    if (p.y+dy < -tab)         dy = -tab - p.y;
    if (p.y+dy+pieceH > ch+tab) dy = ch+tab - pieceH - p.y;
  }
  return {dx, dy};
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function drawPiece(piece) {
  ctx.save();
  ctx.translate(piece.x, piece.y);
  ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=12; ctx.shadowOffsetX=3; ctx.shadowOffsetY=3;
  ctx.save();
  makePath(ctx, pieceW, pieceH, piece.tabs);
  ctx.clip();
  ctx.shadowColor='transparent';
  ctx.drawImage(img, -piece.col*pieceW, -piece.row*pieceH, boardW, boardH);
  ctx.restore();
  ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
  makePath(ctx, pieceW, pieceH, piece.tabs);
  ctx.strokeStyle='rgba(255,255,255,0.65)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  [...pieces].sort((a,b)=>a.zIndex-b.zIndex).forEach(drawPiece);
}

// ─── SCATTER ──────────────────────────────────────────────────────────────────
function scatter() {
  const cw = canvas.width, ch = canvas.height;
  const bW = canvas._bW, bH = canvas._bH;
  const jitter = () => (Math.random()-0.5) * 8;

  const slots = [
    // Top 3
    { x: bW + 0*(pieceW+8) + jitter(), y: (bH-pieceH)/2 + jitter() },
    { x: bW + 1*(pieceW+8) + jitter(), y: (bH-pieceH)/2 + jitter() },
    { x: bW + 2*(pieceW+8) + jitter(), y: (bH-pieceH)/2 + jitter() },
    // Bottom 3
    { x: bW + 0*(pieceW+8) + jitter(), y: ch - bH + (bH-pieceH)/2 + jitter() },
    { x: bW + 1*(pieceW+8) + jitter(), y: ch - bH + (bH-pieceH)/2 + jitter() },
    { x: bW + 2*(pieceW+8) + jitter(), y: ch - bH + (bH-pieceH)/2 + jitter() },
    // Left 2
    { x: (bW-pieceW)/2 + jitter(), y: bH + 0*(pieceH+8) + jitter() },
    { x: (bW-pieceW)/2 + jitter(), y: bH + 1*(pieceH+8) + jitter() },
    // Right 1
    { x: cw - bW + (bW-pieceW)/2 + jitter(), y: bH + pieceH/2 + jitter() },
  ];

  [...pieces].sort(()=>Math.random()-.5).forEach((piece, i) => {
    piece.x = Math.max(2, Math.min(cw-pieceW-2, slots[i].x));
    piece.y = Math.max(2, Math.min(ch-pieceH-2, slots[i].y));
    piece.zIndex = i;
  });
}

// ─── SETUP ────────────────────────────────────────────────────────────────────
function setup() {
  canvas = document.getElementById('gameCanvas');
  ctx    = canvas.getContext('2d');

  const aspect = img.naturalWidth / img.naturalHeight;
  const availW = Math.min(window.innerWidth - 32, 1100);
  const availH = window.innerHeight - 150;
  const BR = 0.22; // border ratio each side

  const maxBoardW  = availW * (1 - 2*BR);
  const boardH_fromW = maxBoardW / aspect;
  const boardH_fromH = availH * (1 - 2*BR);
  boardH = Math.floor(Math.min(boardH_fromW, boardH_fromH));
  boardW = Math.floor(boardH * aspect);
  pieceW = boardW / COLS;
  pieceH = boardH / ROWS;

  const bW = Math.ceil(pieceW * 1.15);
  const bH = Math.ceil(pieceH * 1.15);
  canvas.width  = boardW + 2*bW;
  canvas.height = boardH + 2*bH;
  canvas._bW = bW;
  canvas._bH = bH;

  const cc = document.getElementById('confettiCanvas');
  cc.width = canvas.width; cc.height = canvas.height;

  const tabs = genTabs();
  groups = {}; nextGID = 0; pieces = [];
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const idx = pieces.length;
      pieces.push({ row:r, col:c, tabs:pieceTabs(r,c,tabs), x:0, y:0, zIndex:0, groupId:-1 });
      createGroup(idx);
    }
  }

  scatter();
  render();
  attachEvents();
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
function getPos(e) {
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
  const src=e.touches?e.touches[0]:e;
  return { x:(src.clientX-rect.left)*sx, y:(src.clientY-rect.top)*sy };
}

function onDown(e) {
  e.preventDefault();
  const {x,y} = getPos(e);
  const piece = pieceAt(x,y);
  if (!piece) return;
  dragging = { groupId: piece.groupId };
  dragLastX = x; dragLastY = y;
  const z = ++maxZ;
  groups[piece.groupId].forEach(i => pieces[i].zIndex = z);
  canvas.style.cursor = 'grabbing';
  render();
}

function onMove(e) {
  const {x,y} = getPos(e);
  if (dragging) {
    e.preventDefault();
    let dx = x - dragLastX, dy = y - dragLastY;
    ({dx, dy} = clampGroup(dragging.groupId, dx, dy));
    groups[dragging.groupId].forEach(i => { pieces[i].x += dx; pieces[i].y += dy; });
    dragLastX = x; dragLastY = y;
    render();
  } else {
    canvas.style.cursor = pieceAt(x,y) ? 'grab' : 'default';
  }
}

function onUp() {
  if (!dragging) return;
  trySnap(dragging.groupId);
  render();
  if (checkWin()) {
    setTimeout(() => {
      playWin();
      launchConfetti();
      document.getElementById('resetBtn').classList.add('show');
    }, 250);
  }
  dragging = null;
  canvas.style.cursor = 'default';
}

function attachEvents() {
  canvas.addEventListener('mousedown',  onDown);
  window.addEventListener('mousemove',  onMove);
  window.addEventListener('mouseup',    onUp);
  canvas.addEventListener('touchstart', onDown, {passive:false});
  window.addEventListener('touchmove',  onMove, {passive:false});
  window.addEventListener('touchend',   onUp);
}

// ─── CONFETTI ─────────────────────────────────────────────────────────────────
const CONFETTI_COLORS = ['#FFD700','#ed7c5a','#55b6ca','#ffffff','#c084fc','#86efac'];
let confettiParticles=[], confettiRAF=null;

function launchConfetti() {
  const cc = document.getElementById('confettiCanvas');
  cc.width = canvas.width; cc.height = canvas.height;
  const c2 = cc.getContext('2d');
  confettiParticles = Array.from({length:120}, ()=>({
    x: Math.random()*cc.width, y: Math.random()*-cc.height*0.5,
    w: 6+Math.random()*6, h: 10+Math.random()*6,
    color: CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)],
    angle: Math.random()*Math.PI*2, spin: (Math.random()-.5)*0.2,
    vx: (Math.random()-.5)*2.5, vy: 2+Math.random()*3, alpha: 1,
  }));
  if (confettiRAF) cancelAnimationFrame(confettiRAF);
  function animate() {
    c2.clearRect(0,0,cc.width,cc.height);
    let alive=false;
    for (const p of confettiParticles) {
      p.x+=p.vx; p.y+=p.vy; p.angle+=p.spin;
      if (p.y>cc.height*0.7) p.alpha-=0.025;
      if (p.alpha<=0) continue;
      alive=true;
      c2.save(); c2.globalAlpha=p.alpha; c2.translate(p.x,p.y); c2.rotate(p.angle);
      c2.fillStyle=p.color; c2.fillRect(-p.w/2,-p.h/2,p.w,p.h); c2.restore();
    }
    if (alive) confettiRAF=requestAnimationFrame(animate);
  }
  animate();
}

// ─── RESET ────────────────────────────────────────────────────────────────────
function resetPuzzle() {
  document.getElementById('resetBtn').classList.remove('show');
  const cc = document.getElementById('confettiCanvas');
  cc.getContext('2d').clearRect(0,0,cc.width,cc.height);
  if (confettiRAF) { cancelAnimationFrame(confettiRAF); confettiRAF=null; }
  groups={}; nextGID=0; maxZ=0;
  const tabs = genTabs();
  pieces.forEach((p,i) => { p.tabs=pieceTabs(p.row,p.col,tabs); p.zIndex=0; createGroup(i); });
  scatter(); render();
}
document.getElementById('resetBtn').addEventListener('click', resetPuzzle);

// ─── VOICEOVER ────────────────────────────────────────────────────────────────
document.getElementById('playBtn').addEventListener('click', () => {
  const a = document.getElementById('voiceover'); a.currentTime=0; a.play().catch(()=>{});
});

// ─── MUSIC ────────────────────────────────────────────────────────────────────
const bgMusic=document.getElementById('bgMusic'), musicBtn=document.getElementById('musicBtn');
let musicOn=false;
musicBtn.addEventListener('click', () => {
  if (musicOn) { bgMusic.pause(); musicOn=false; musicBtn.classList.remove('playing'); }
  else { bgMusic.volume=0.35; bgMusic.play().catch(()=>{}); musicOn=true; musicBtn.classList.add('playing'); }
});

// ─── BOOT ─────────────────────────────────────────────────────────────────────
img = new Image();
img.onload  = setup;
img.onerror = () => alert('Could not load puzzle image. Make sure the dev server is running.');
img.src = '/puzzle-sun.png';
</script>
</body>
</html>
