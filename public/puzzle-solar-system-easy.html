<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Sun Puzzle - Easy</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: url('/space-bg.png') center center / cover no-repeat fixed;
      font-family: 'Nunito', sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      user-select: none;
      -webkit-user-select: none;
    }

    h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      color: #FFD700;
      text-align: center;
      margin-bottom: 14px;
      text-shadow: 0 0 24px rgba(255,215,0,0.35);
    }

    .instructions-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      background: rgba(255,255,255,0.08);
      border-radius: 50px;
      padding: 10px 20px;
      max-width: 640px;
      width: 100%;
    }

    #playBtn {
      background: #ed7c5a;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      min-width: 42px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background 0.15s;
    }
    #playBtn:hover  { background: #d4623f; transform: scale(1.08); }
    #playBtn:active { transform: scale(0.95); }
    #playBtn svg    { width: 18px; height: 18px; fill: white; margin-left: 2px; }

    #musicBtn {
      background: rgba(255,255,255,0.12);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      min-width: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background 0.15s;
      margin-left: auto;
    }
    #musicBtn:hover { background: rgba(255,255,255,0.22); }
    #musicBtn svg   { width: 18px; height: 18px; fill: #ccc; }
    #musicBtn.playing svg { fill: #FFD700; }

    .instructions-text {
      font-size: 0.92rem;
      color: #ddd;
      line-height: 1.45;
    }

    #canvasWrap { position: relative; }
    canvas { display: block; touch-action: none; cursor: default; }

    #confettiCanvas {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 10;
    }

    #resetBtn {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: rgba(5, 10, 26, 0.75);
      border: 3px solid rgba(255,255,255,0.6);
      border-radius: 50%;
      width: 72px;
      height: 72px;
      cursor: pointer;
      z-index: 11;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    #resetBtn.show { display: flex; }
    #resetBtn:hover  { background: rgba(237,124,90,0.85); border-color: white; }
    #resetBtn:active { transform: translate(-50%, -50%) scale(0.93); }
    #resetBtn svg { width: 36px; height: 36px; fill: white; }
    @keyframes popIn {
      0%   { opacity: 0; transform: translateX(-50%) scale(0.5); }
      100% { opacity: 1; transform: translateX(-50%) scale(1); }
    }
  </style>
</head>
<body>

<h1>The Sun Puzzle - Easy</h1>

<div class="instructions-bar">
  <button id="playBtn" title="Play instructions">
    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </button>
  <span class="instructions-text">Drag the pieces to solve the puzzle. When a piece is in the right spot, it will snap into place!</span>
  <button id="musicBtn" title="Toggle music">
    <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
  </button>
</div>

<div id="canvasWrap">
  <canvas id="gameCanvas"></canvas>
  <canvas id="confettiCanvas"></canvas>
  <button id="resetBtn" title="Reset puzzle">
    <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
  </button>
</div>

<audio id="voiceover" src="/puzzle-easy-instructions.mp3" preload="auto"></audio>
<audio id="snapSound" src="/puzzle-snap.mp3" preload="auto"></audio>
<audio id="completeVoice" src="/puzzle-complete.mp3" preload="auto"></audio>
<audio id="bgMusic" src="/puzzle-bg-music.mp3" loop preload="auto"></audio>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const ROWS = 3, COLS = 3;
const SNAP_DIST  = 30;   // px — how close to snap
const TAB_BUMP   = 0.14; // fraction of edge length the tab protrudes

// ─── STATE ────────────────────────────────────────────────────────────────────
let canvas, ctx, img;
let boardX, boardY, boardW, boardH, pieceW, pieceH;
let pieces = [], dragging = null, dragOX = 0, dragOY = 0, maxZ = 0;
let audioCtx = null;

// ─── AUDIO ────────────────────────────────────────────────────────────────────
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSnap() {
  try {
    const sfx = document.getElementById('snapSound');
    sfx.currentTime = 0;
    sfx.play().catch(() => {});
  } catch(e) {}
}

function playWin() {
  try {
    const ac = getAC();
    [523, 659, 784, 1047, 1318].forEach((freq, i) => {
      const osc = ac.createOscillator(), gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      const t = ac.currentTime + i * 0.13;
      gain.gain.setValueAtTime(0.22, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
      osc.start(t); osc.stop(t + 0.55);
    });
  } catch(e) {}
}

// ─── TAB GENERATION ───────────────────────────────────────────────────────────
// hTabs[r][c] = direction of tab between row r and row r+1, at col c  (+1 or -1)
// vTabs[r][c] = direction of tab between col c and col c+1, at row r  (+1 or -1)
function genTabs() {
  const h = [], v = [];
  for (let r = 0; r < ROWS-1; r++) {
    h[r] = [];
    for (let c = 0; c < COLS; c++) h[r][c] = Math.random() < 0.5 ? 1 : -1;
  }
  for (let r = 0; r < ROWS; r++) {
    v[r] = [];
    for (let c = 0; c < COLS-1; c++) v[r][c] = Math.random() < 0.5 ? 1 : -1;
  }
  return { h, v };
}

function pieceTabs(r, c, { h, v }) {
  return {
    top:    r === 0       ? 0 : -h[r-1][c],
    bottom: r === ROWS-1  ? 0 :  h[r][c],
    left:   c === 0       ? 0 : -v[r][c-1],
    right:  c === COLS-1  ? 0 :  v[r][c],
  };
}

// ─── JIGSAW PATH ──────────────────────────────────────────────────────────────
// Draws one edge from (x1,y1) to (x2,y2).
// type +1 = tab sticking OUTWARD, -1 = indent, 0 = flat.
// Uses the right-hand perpendicular (outward for clockwise CW traversal in canvas).
function jigsawEdge(ctx2d, x1, y1, x2, y2, type) {
  if (type === 0) { ctx2d.lineTo(x2, y2); return; }

  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx*dx + dy*dy);
  // Right-hand perpendicular in canvas coords (outward when traversing CW)
  const px = dy / len, py = -dx / len;
  const h = len * TAB_BUMP * type; // positive = outward

  // Tab occupies middle 40% of edge (30%–70%)
  const A = 0.30, B = 0.42, MID = 0.50, D = 0.58, E = 0.70;

  const ax = x1+dx*A,   ay = y1+dy*A;
  const bx = x1+dx*B,   by = y1+dy*B;
  const mx = x1+dx*MID, my = y1+dy*MID;
  const dx2= x1+dx*D,   dy2= y1+dy*D;
  const ex = x1+dx*E,   ey = y1+dy*E;

  ctx2d.lineTo(ax, ay);
  // Rising side
  ctx2d.bezierCurveTo(
    ax + px*h*0.3, ay + py*h*0.3,
    bx + px*h,     by + py*h,
    mx + px*h*1.1, my + py*h*1.1
  );
  // Falling side
  ctx2d.bezierCurveTo(
    dx2 + px*h,     dy2 + py*h,
    ex  + px*h*0.3, ey  + py*h*0.3,
    ex, ey
  );
  ctx2d.lineTo(x2, y2);
}

// Build full jigsaw piece path at origin (0,0) → (pw, ph)
function makePath(ctx2d, pw, ph, tabs) {
  ctx2d.beginPath();
  ctx2d.moveTo(0, 0);
  jigsawEdge(ctx2d,  0,  0, pw,  0, tabs.top);    // top:    L → R
  jigsawEdge(ctx2d, pw,  0, pw, ph, tabs.right);   // right:  T → B
  jigsawEdge(ctx2d, pw, ph,  0, ph, tabs.bottom);  // bottom: R → L
  jigsawEdge(ctx2d,  0, ph,  0,  0, tabs.left);    // left:   B → T
  ctx2d.closePath();
}

// ─── HIT TEST ─────────────────────────────────────────────────────────────────
// Tests whether (mx, my) is inside piece's jigsaw shape.
// Converts to local coords so no transform needed on the test canvas.
function hitTest(piece, mx, my) {
  const lx = mx - piece.x, ly = my - piece.y;
  const tc = document.createElement('canvas').getContext('2d');
  makePath(tc, pieceW, pieceH, piece.tabs);
  return tc.isPointInPath(lx, ly);
}

function pieceAt(mx, my) {
  // Topmost (highest zIndex) unlocked piece first
  const sorted = pieces.filter(p => !p.locked).sort((a, b) => b.zIndex - a.zIndex);
  for (const p of sorted) {
    const buf = Math.max(pieceW, pieceH) * TAB_BUMP * 1.5;
    if (mx < p.x - buf || mx > p.x + pieceW + buf) continue;
    if (my < p.y - buf || my > p.y + pieceH + buf) continue;
    if (hitTest(p, mx, my)) return p;
  }
  return null;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function drawBoard() {
  // Draw jigsaw piece outlines as placement guides
  for (const piece of pieces) {
    ctx.save();
    ctx.translate(piece.targetX, piece.targetY);
    makePath(ctx, pieceW, pieceH, piece.tabs);
    ctx.strokeStyle = piece.locked ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.22)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
  }

}

function drawPiece(piece) {
  ctx.save();
  ctx.translate(piece.x, piece.y);

  // Drop shadow for floating pieces
  if (!piece.locked) {
    ctx.shadowColor   = 'rgba(0,0,0,0.55)';
    ctx.shadowBlur    = 14;
    ctx.shadowOffsetX = 4;
    ctx.shadowOffsetY = 4;
  }

  // Clip to jigsaw shape and draw image
  ctx.save();
  makePath(ctx, pieceW, pieceH, piece.tabs);
  ctx.clip();

  // Draw the full board image offset so the correct tile shows at (0,0)
  // Tabs outside (0,0)→(pw,ph) will show the correct adjacent image content
  ctx.shadowColor = 'transparent';
  ctx.drawImage(img, -piece.col * pieceW, -piece.row * pieceH, boardW, boardH);
  ctx.restore();

  // Reset shadow before stroke
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur  = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  // Outline
  makePath(ctx, pieceW, pieceH, piece.tabs);
  ctx.strokeStyle = piece.locked ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.75)';
  ctx.lineWidth   = piece.locked ? 0.5 : 1.5;
  ctx.stroke();

  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBoard();

  // Locked pieces first, then by zIndex
  const sorted = [...pieces].sort((a, b) => {
    if (a.locked !== b.locked) return a.locked ? -1 : 1;
    return a.zIndex - b.zIndex;
  });
  sorted.forEach(drawPiece);
}

// ─── SCATTER ──────────────────────────────────────────────────────────────────
function scatter() {
  const cw = canvas.width, ch = canvas.height;
  const lm = boardX, tm = boardY; // margin sizes

  // Build 9 slots: 3 top, 3 bottom, 2 left, 1 right
  const jitter = () => (Math.random() - 0.5) * 10;
  const slots = [
    // Top (3) — spread across top margin
    { x: lm + 0 * (boardW/3) + jitter(), y: (tm - pieceH) / 2 + jitter() },
    { x: lm + 1 * (boardW/3) + jitter(), y: (tm - pieceH) / 2 + jitter() },
    { x: lm + 2 * (boardW/3) + jitter(), y: (tm - pieceH) / 2 + jitter() },
    // Bottom (3)
    { x: lm + 0 * (boardW/3) + jitter(), y: boardY + boardH + (tm - pieceH) / 2 + jitter() },
    { x: lm + 1 * (boardW/3) + jitter(), y: boardY + boardH + (tm - pieceH) / 2 + jitter() },
    { x: lm + 2 * (boardW/3) + jitter(), y: boardY + boardH + (tm - pieceH) / 2 + jitter() },
    // Left (2)
    { x: (lm - pieceW) / 2 + jitter(), y: boardY + 0 * (boardH/2) + jitter() },
    { x: (lm - pieceW) / 2 + jitter(), y: boardY + 1 * (boardH/2) + jitter() },
    // Right (1) — centred vertically
    { x: boardX + boardW + (lm - pieceW) / 2 + jitter(), y: boardY + boardH/3 + jitter() },
  ];

  const shuffled = [...pieces].sort(() => Math.random() - 0.5);
  shuffled.forEach((piece, i) => {
    piece.x = Math.max(2, Math.min(cw - pieceW - 2, slots[i].x));
    piece.y = Math.max(2, Math.min(ch - pieceH - 2, slots[i].y));
    piece.zIndex = i;
  });
}

// ─── SETUP ────────────────────────────────────────────────────────────────────
function setup() {
  canvas = document.getElementById('gameCanvas');
  ctx    = canvas.getContext('2d');

  const aspect = img.naturalWidth / img.naturalHeight;
  const availW = Math.min(window.innerWidth - 32, 1300);
  const availH = window.innerHeight - 150;

  // Board in center, pieces in margins all around.
  // margin = 1 piece wide/tall + padding.
  // canvasW = boardW * 5/3 + 40  →  boardW = (availW - 40) * 3/5
  // canvasH = boardH * 5/3 + 40  →  boardH = (availH - 40) * 3/5
  const boardW_fromW = (availW - 40) * 3 / 5;
  const boardH_fromW = boardW_fromW / aspect;
  const boardH_fromH = (availH - 40) * 3 / 5;
  boardH = Math.floor(Math.min(boardH_fromW, boardH_fromH));
  boardW = Math.floor(boardH * aspect);
  pieceW = boardW / COLS;
  pieceH = boardH / ROWS;

  const lm = Math.floor(pieceW + 20); // left margin
  const tm = Math.floor(pieceH + 20); // top margin

  canvas.width  = lm + boardW + lm;
  canvas.height = tm + boardH + tm;
  boardX = lm;
  boardY = tm;

  const tabs = genTabs();
  pieces = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      pieces.push({
        row: r, col: c,
        tabs: pieceTabs(r, c, tabs),
        x: 0, y: 0,
        targetX: boardX + c * pieceW,
        targetY: boardY + r * pieceH,
        locked: false,
        zIndex: 0,
      });
    }
  }

  // Size confetti canvas to match
  const cc = document.getElementById('confettiCanvas');
  cc.width  = canvas.width;
  cc.height = canvas.height;

  scatter();
  render();
  attachEvents();
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
function getPos(e) {
  const rect   = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const src    = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * scaleX,
    y: (src.clientY - rect.top)  * scaleY,
  };
}

function onDown(e) {
  e.preventDefault();
  const { x, y } = getPos(e);
  const piece = pieceAt(x, y);
  if (!piece) return;
  dragging = piece;
  dragOX = x - piece.x;
  dragOY = y - piece.y;
  piece.zIndex = ++maxZ;
  canvas.style.cursor = 'grabbing';
  render();
}

function onMove(e) {
  const { x, y } = getPos(e);
  if (dragging) {
    e.preventDefault();
    dragging.x = x - dragOX;
    dragging.y = y - dragOY;
    render();
  } else {
    canvas.style.cursor = pieceAt(x, y) ? 'grab' : 'default';
  }
}

function onUp() {
  if (!dragging) return;
  const dx = dragging.x - dragging.targetX;
  const dy = dragging.y - dragging.targetY;

  if (Math.abs(dx) < SNAP_DIST && Math.abs(dy) < SNAP_DIST) {
    dragging.x = dragging.targetX;
    dragging.y = dragging.targetY;
    dragging.locked = true;
    playSnap();

    if (pieces.every(p => p.locked)) {
      setTimeout(() => {
        playWin();
        launchConfetti();
        document.getElementById('resetBtn').classList.add('show');
      }, 250);
    }
  }

  dragging = null;
  canvas.style.cursor = 'default';
  render();
}

function attachEvents() {
  canvas.addEventListener('mousedown',  onDown);
  window.addEventListener('mousemove',  onMove);
  window.addEventListener('mouseup',    onUp);
  canvas.addEventListener('touchstart', onDown, { passive: false });
  window.addEventListener('touchmove',  onMove, { passive: false });
  window.addEventListener('touchend',   onUp);
}

// ─── CONFETTI ─────────────────────────────────────────────────────────────────
const CONFETTI_COLORS = ['#FFD700', '#ed7c5a', '#55b6ca', '#ffffff', '#c084fc', '#86efac'];
let confettiParticles = [], confettiRAF = null;

function launchConfetti() {
  const cc = document.getElementById('confettiCanvas');
  cc.width  = canvas.width;
  cc.height = canvas.height;
  const ctx2 = cc.getContext('2d');

  confettiParticles = Array.from({ length: 120 }, () => ({
    x:     Math.random() * cc.width,
    y:     Math.random() * -cc.height * 0.5,
    w:     6 + Math.random() * 6,
    h:     10 + Math.random() * 6,
    color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
    angle: Math.random() * Math.PI * 2,
    spin:  (Math.random() - 0.5) * 0.2,
    vx:    (Math.random() - 0.5) * 2.5,
    vy:    2 + Math.random() * 3,
    alpha: 1,
  }));

  if (confettiRAF) cancelAnimationFrame(confettiRAF);

  function animate() {
    ctx2.clearRect(0, 0, cc.width, cc.height);
    let alive = false;
    for (const p of confettiParticles) {
      p.x     += p.vx;
      p.y     += p.vy;
      p.angle += p.spin;
      if (p.y > cc.height * 0.7) p.alpha -= 0.025;
      if (p.alpha <= 0) continue;
      alive = true;
      ctx2.save();
      ctx2.globalAlpha = p.alpha;
      ctx2.translate(p.x, p.y);
      ctx2.rotate(p.angle);
      ctx2.fillStyle = p.color;
      ctx2.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx2.restore();
    }
    if (alive) confettiRAF = requestAnimationFrame(animate);
    else ctx2.clearRect(0, 0, cc.width, cc.height);
  }
  animate();
}

// ─── RESET ────────────────────────────────────────────────────────────────────
function resetPuzzle() {
  // Hide reset button and clear confetti
  document.getElementById('resetBtn').classList.remove('show');
  const cc = document.getElementById('confettiCanvas');
  cc.getContext('2d').clearRect(0, 0, cc.width, cc.height);
  if (confettiRAF) { cancelAnimationFrame(confettiRAF); confettiRAF = null; }

  // Unlock all pieces and re-scatter
  pieces.forEach(p => { p.locked = false; p.zIndex = 0; });
  maxZ = 0;
  scatter();
  render();
}

document.getElementById('resetBtn').addEventListener('click', resetPuzzle);

// ─── VOICEOVER ────────────────────────────────────────────────────────────────
document.getElementById('playBtn').addEventListener('click', () => {
  const audio = document.getElementById('voiceover');
  audio.currentTime = 0;
  audio.play().catch(() => {});
});

// ─── BACKGROUND MUSIC ─────────────────────────────────────────────────────────
const bgMusic  = document.getElementById('bgMusic');
const musicBtn = document.getElementById('musicBtn');
let musicOn = false;

musicBtn.addEventListener('click', () => {
  if (musicOn) {
    bgMusic.pause();
    musicOn = false;
    musicBtn.classList.remove('playing');
  } else {
    bgMusic.volume = 0.35;
    bgMusic.play().catch(() => {});
    musicOn = true;
    musicBtn.classList.add('playing');
  }
});

// ─── BOOT ─────────────────────────────────────────────────────────────────────
img = new Image();
img.onload  = setup;
img.onerror = () => alert('Could not load puzzle image. Make sure the dev server is running.');
img.src = '/puzzle-sun.png';
</script>
</body>
</html>
