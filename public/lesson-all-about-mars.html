<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All About Mars</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #07112a; overflow: hidden; font-family: 'Nunito', sans-serif; }

/* ── 16:9 stage ──────────────────────────────────────────── */
.stage {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 100vw; height: 56.25vw;
  max-height: 100vh; max-width: 177.78vh;
  overflow: hidden;
}

/* ── Background image (swapped per template) ────────────── */
.bg { position: absolute; inset: 0; background-size: cover; background-position: center; }

/* ── Home button (top-left) ─────────────────────────────── */
.home-btn {
  position: absolute; left: 1.8%; top: 4.5%;
  width: 4vw; height: 4vw;
  background: #d92343; border: none; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 20;
  box-shadow: 0 0.2vw 1vw rgba(217,35,67,0.5);
  transition: transform 0.15s;
}
.home-btn:hover { transform: scale(1.08); }
.home-btn svg { width: 52%; height: 52%; fill: white; }

/* ── Slide counter (top-right) ──────────────────────────── */
.slide-counter {
  position: absolute; right: 1.8%; top: 4.5%;
  background: rgba(255,255,255,0.18);
  border: 1.5px solid rgba(255,255,255,0.35);
  border-radius: 2vw; padding: 0.4vw 1.2vw;
  color: white; font-size: 1.3vw; font-weight: 800;
  z-index: 20;
}

/* ── Title (left panel) ─────────────────────────────────── */
.slide-title {
  position: absolute; left: 4%; top: 16%;
  color: white; font-size: 3.2vw; font-weight: 900;
  line-height: 1.1;
  max-width: 46%;
}

/* ── Body text (left panel) ─────────────────────────────── */
.slide-body {
  position: absolute; left: 4%; top: 34%;
  color: white; font-size: 1.9vw; font-weight: 400;
  line-height: 1.7; max-width: 46%;
}

/* ── Image box (right panel, white border) ──────────────── */
.slide-image-box {
  position: absolute; left: 54%; top: 12%;
  width: 40%; height: 67%;
  border: 0.35vw solid white;
  border-radius: 0.5vw;
  overflow: hidden;
  background: black;
}
.slide-image-box img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}

/* ── Two-image layout (template page 5) ─────────────────── */
.slide-image-pair {
  position: absolute; left: 4%; top: 18%;
  width: 92%; display: flex; gap: 2%;
}
.slide-image-pair .img-box {
  flex: 1; aspect-ratio: 1/1;
  border: 0.4vw solid #d92343; border-radius: 0.8vw;
  overflow: hidden; background: black;
}
.slide-image-pair .img-box img { width: 100%; height: 100%; object-fit: cover; }

/* ── Large infographic image (full-width template) ───────── */
.slide-infographic {
  position: absolute; left: 4%; top: 38%;
  width: 92%; height: 52%;
  border: 0.35vw solid white; border-radius: 0.5vw;
  overflow: hidden; background: black;
}
.slide-infographic img { width: 100%; height: 100%; object-fit: contain; }

/* ── Video button bar overlay ───────────────────────────── */
/* Transparent hotspot exactly covering the baked-in teal bar */
.video-bar-hotspot {
  position: absolute; left: 3.5%; top: 56%;
  width: 46%; height: 17%;
  cursor: pointer; z-index: 10;
}
/* Clickable play circles — sit exactly on top of the circles baked into the background */
.play-btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 5vw; height: 5vw; border-radius: 50%;
  border: none; cursor: pointer; z-index: 11;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, box-shadow 0.15s;
  opacity: 0; /* invisible — visual comes from background image */
}
.play-btn:hover { transform: translateY(-50%) scale(1.12); opacity: 0.25; background: white; }
.play-btn-1 { left: 71%;  background: #d92343; }
.play-btn-2 { left: 82%;  background: #eeb72b; }

/* Single-video bar variant */
.video-bar-single .play-btn-1 { left: 77%; }

/* ── Continue button (bottom-right) ─────────────────────── */
.continue-group {
  position: absolute; right: 1.8%; bottom: 10%;
  display: inline-flex; align-items: center; z-index: 20;
}
.continue-audio-btn {
  width: 3.2vw; height: 3.2vw; background: #21c593;
  border: none; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; z-index: 2;
  margin-right: -1.6vw;
  animation: audioPulse 2s ease-in-out infinite;
  box-shadow: 0 0 0 0 rgba(33,197,147,0.7);
}
.continue-audio-btn svg { width: 48%; height: 48%; fill: white; }
.continue-btn {
  height: 4.2vw; padding: 0 1.2vw 0 2.2vw;
  background: #d92343; color: white; border: none;
  border-radius: 2.1vw; font-family: 'Nunito', sans-serif;
  font-size: 1.5vw; font-weight: 900; letter-spacing: 0.1em;
  cursor: pointer; position: relative; z-index: 1;
  box-shadow: 0 0.3vw 1.2vw rgba(217,35,67,0.5);
  transition: transform 0.15s, box-shadow 0.15s;
  display: flex; align-items: center; gap: 0.8vw;
}
.continue-btn:hover { transform: scale(1.04); box-shadow: 0 0.4vw 1.8vw rgba(217,35,67,0.7); }
.continue-btn:active { transform: scale(0.97); }
.continue-arrow {
  width: 3vw; height: 3vw; background: rgba(255,255,255,0.22);
  border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.continue-arrow svg { width: 55%; height: 55%; fill: white; }

@keyframes audioPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(33,197,147,0.7); }
  50%       { box-shadow: 0 0 0 0.8vw rgba(33,197,147,0); }
}

/* ── Music toggle (bottom-right corner) ─────────────────── */
.music-btn {
  position: absolute; bottom: 2%; right: 1%;
  width: 3.2vw; height: 3.2vw;
  background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.3);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.2s; z-index: 20;
}
.music-btn:hover { background: rgba(255,255,255,0.25); }
.music-btn svg { width: 50%; height: 50%; fill: white; }
.music-btn.muted { opacity: 0.4; }

/* ── Video modal ─────────────────────────────────────────── */
.modal {
  display: none; position: absolute; inset: 0;
  background: rgba(0,0,0,0.85); z-index: 50;
  align-items: center; justify-content: center;
}
.modal.open { display: flex; }
.modal-inner {
  position: relative; width: 82%; padding-top: 46.125%; /* 16:9 */
  background: black; border-radius: 0.6vw; overflow: hidden;
}
.modal-inner iframe {
  position: absolute; inset: 0; width: 100%; height: 100%; border: none;
}
.modal-close {
  position: absolute; top: -1.8vw; right: -1.8vw;
  width: 3.6vw; height: 3.6vw; background: #d92343;
  border: none; border-radius: 50%; color: white; font-size: 1.8vw;
  font-weight: 900; cursor: pointer; display: flex;
  align-items: center; justify-content: center; z-index: 51;
}
</style>
</head>
<body>
<div class="stage" id="stage">

  <!-- Background (template image) -->
  <div class="bg" id="bg"></div>

  <!-- Home button → /learn -->
  <button class="home-btn" onclick="goHome()" title="Back to lessons">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
  </button>

  <!-- Slide counter -->
  <div class="slide-counter" id="counter">1 / 7</div>

  <!-- Dynamic slide content -->
  <div class="slide-title"  id="slide-title"></div>
  <div class="slide-body"   id="slide-body"></div>
  <div class="slide-image-box" id="slide-image-box">
    <img id="slide-img" src="" alt="">
  </div>

  <!-- Video bar (2-video template) — overlaid on background bar -->
  <div class="video-bar-hotspot" id="video-bar" onclick="playWatchAudio()">
    <button class="play-btn play-btn-1" id="play-btn-1" onclick="event.stopPropagation(); openVideo(1)"></button>
    <button class="play-btn play-btn-2" id="play-btn-2" onclick="event.stopPropagation(); openVideo(2)"></button>
  </div>

  <!-- Continue button -->
  <div class="continue-group">
    <button class="continue-audio-btn" onclick="playContinueAudio()" title="Listen">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    </button>
    <button class="continue-btn" id="continue-btn" onclick="nextSlide()">
      CONTINUE
      <span class="continue-arrow">
        <svg viewBox="0 0 24 24"><path d="M8.59 16.58L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.42z"/></svg>
      </span>
    </button>
  </div>

  <!-- Music toggle -->
  <button class="music-btn" id="music-btn" onclick="toggleMusic()">
    <svg id="music-icon" viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
  </button>

  <!-- Video modal -->
  <div class="modal" id="modal">
    <div class="modal-inner">
      <button class="modal-close" onclick="closeVideo()">✕</button>
      <iframe id="modal-iframe" src="" allowfullscreen allow="autoplay"></iframe>
    </div>
  </div>

  <!-- Audio -->
  <audio id="bg-music"    src="/puzzle-bg-music.mp3" loop></audio>
  <audio id="watch-audio" src="/watch these videos.mp3"></audio>
  <audio id="cont-audio"  src="/continue.mp3"></audio>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  SLIDES DATA — fill in each slide's content here
//  template types:
//    'page1'  = title + body + image (right) + 2 videos
//    'page2'  = title + body + image (right) + 1 video
//    'page3'  = title + subtitle + image (right), no video
//    'page4'  = title + body + large infographic (bottom)
//    'page5'  = title + subtitle + 2 images side-by-side
// ═══════════════════════════════════════════════════════════════
const SLIDES = [
  {
    // ── SLIDE 1 ─────────────────────────────────────────────
    template: 'page1',
    title:    'Mars',
    body:     'Mars is the fourth planet from the Sun, and it appears red because of the iron in its rocks, soil, and dust.',
    image:    '/mars-with-background.png',
    imageAlt: 'Mars planet (NASA)',
    video1:   'YOUTUBE_ID_1',   // TODO: "Paxi - The Red Planet" (ESA)
    video2:   'YOUTUBE_ID_2',   // TODO: "Mars in a Minute: Is Mars Really Red?" (NASAJPL)
    narration: '/mars-fact-1.mp3',
    counter:  '1 / 7',
    next:     null,             // null = last slide, string = URL to navigate on Done
  },

  // ── SLIDE 2 ─────────────────────────────────────────────────
  // {
  //   template: 'page5',   // two images side-by-side
  //   title:    'How big is Mars?',
  //   body:     'Mars is about half the size of Earth.',
  //   image1:   '/IMAGE_A.jpg',
  //   image2:   '/IMAGE_B.jpg',
  //   narration: '/AUDIO.mp3',
  //   counter:  '2 / 7',
  //   next:     null,
  // },

  // ── ADD MORE SLIDES HERE ────────────────────────────────────
];

// ═══════════════════════════════════════════════════════════════
let current = 0;

const bg        = document.getElementById('bg');
const title     = document.getElementById('slide-title');
const body      = document.getElementById('slide-body');
const imgBox    = document.getElementById('slide-image-box');
const img       = document.getElementById('slide-img');
const videoBar  = document.getElementById('video-bar');
const counter   = document.getElementById('counter');
const contBtn   = document.getElementById('continue-btn');
const bgMusic   = document.getElementById('bg-music');
const watchAud  = document.getElementById('watch-audio');
const contAud   = document.getElementById('cont-audio');
let musicOn     = false;

function render(i) {
  const s = SLIDES[i];
  counter.textContent = s.counter || (i + 1) + ' / ' + SLIDES.length;

  // Background template image
  bg.style.backgroundImage = `url('/ss-lesson-template-${s.template}.jpg')`;

  // Text
  title.textContent = s.title || '';
  body.innerHTML    = (s.body  || '').replace(/\n/g, '<br>');

  // Image / layout
  const isPage5 = s.template === 'page5';
  imgBox.style.display = isPage5 ? 'none' : 'block';
  if (!isPage5 && s.image) {
    img.src = s.image;
    img.alt = s.imageAlt || '';
  }

  // Video bar visibility
  const hasVideos = s.template === 'page1' || s.template === 'page2';
  videoBar.style.display = hasVideos ? 'block' : 'none';
  document.getElementById('play-btn-2').style.display = (s.template === 'page1') ? 'block' : 'none';

  // Store videos on bar
  videoBar.dataset.v1 = s.video1 || '';
  videoBar.dataset.v2 = s.video2 || '';

  // Continue label: last slide becomes "Done!"
  const isLast = i === SLIDES.length - 1;
  contBtn.querySelector('.continue-arrow') && (contBtn.querySelector('.continue-arrow').style.display = 'flex');
  contBtn.childNodes[0].textContent = isLast ? 'DONE! ' : 'CONTINUE';
}

function nextSlide() {
  const s = SLIDES[current];
  if (current < SLIDES.length - 1) {
    current++;
    render(current);
  } else {
    // Last slide — mark complete and return to map
    const dest = s.next || '/lesson-complete.html?lesson=all-about-mars';
    (window.top || window).location.href = dest;
  }
}

function openVideo(num) {
  const id = num === 1 ? videoBar.dataset.v1 : videoBar.dataset.v2;
  if (!id || id.startsWith('YOUTUBE')) {
    alert('Video coming soon!');
    return;
  }
  document.getElementById('modal-iframe').src = 'https://www.youtube.com/embed/' + id + '?autoplay=1';
  document.getElementById('modal').classList.add('open');
  bgMusic.pause();
}

function closeVideo() {
  document.getElementById('modal-iframe').src = '';
  document.getElementById('modal').classList.remove('open');
  if (musicOn) bgMusic.play();
}

function playWatchAudio() {
  watchAud.currentTime = 0;
  watchAud.play();
}

function playContinueAudio() {
  contAud.currentTime = 0;
  contAud.play();
}

function goHome() {
  (window.top || window).location.href = '/learn';
}

function toggleMusic() {
  const btn  = document.getElementById('music-btn');
  const icon = document.getElementById('music-icon');
  if (musicOn) {
    bgMusic.pause(); musicOn = false;
    btn.classList.add('muted');
    icon.innerHTML = '<path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
  } else {
    bgMusic.play(); musicOn = true;
    btn.classList.remove('muted');
    icon.innerHTML = '<path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>';
  }
}

// Boot
bgMusic.volume = 0.3;
bgMusic.play().then(() => { musicOn = true; }).catch(() => {
  document.addEventListener('click', () => { if (!musicOn) { bgMusic.play(); musicOn = true; } }, { once: true });
});
render(0);
</script>
</body>
</html>
