<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All About Mars</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #0a1428;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  /*
    The stage is a 16:9 box that always fits the viewport.
    — If screen is wider than 16:9: stage is height-constrained (100vh tall, <100vw wide)
    — If screen is narrower than 16:9: stage is width-constrained (100vw wide, <100vh tall)
    Everything inside uses %, so all elements scale in lockstep with the image.
  */
  .stage {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    /* Fill viewport while keeping 16:9 */
    width: 100vw;
    height: 56.25vw;      /* 9/16 of width */
    max-height: 100vh;
    max-width: 177.78vh;  /* 16/9 of height */
    background: url('/lesson-mars-title.jpg') center center / cover no-repeat;
  }

  /* ── Audio button — pulsing green circle ── */
  .audio-btn {
    position: absolute;
    /* Positioned in right panel, below the dividing line */
    left: 60.5%;
    top: 72%;
    transform: translate(-50%, -50%);
    width: 5.2%;      /* scales with stage width */
    aspect-ratio: 1;
    background: #21c593;
    border: none;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 10;
    animation: audioPulse 2s ease-in-out infinite;
    box-shadow: 0 2px 14px rgba(33,197,147,0.5);
  }
  .audio-btn svg {
    width: 45%; height: 45%;
    fill: white;
  }

  @keyframes audioPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(33, 197, 147, 0.7); }
    50%       { box-shadow: 0 0 0 1.2% rgba(33, 197, 147, 0); }
  }

  /* ── START button ── */
  .start-btn {
    position: absolute;
    left: 67%;
    top: 72%;
    transform: translate(-50%, -50%);
    width: 18%;
    height: 9%;
    background: #d92343;
    color: white;
    border: none;
    border-radius: 0.8%;  /* slightly rounded — scales with stage */
    font-family: 'Nunito', sans-serif;
    font-size: 2.2%;     /* % of stage width */
    font-weight: 900;
    letter-spacing: 0.15em;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6%;
    box-shadow: 0 0.4% 2% rgba(217,35,67,0.55);
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 10;
  }
  .start-btn:hover {
    transform: translate(-50%, -50%) scale(1.04);
    box-shadow: 0 0.6% 3% rgba(217,35,67,0.75);
  }
  .start-btn:active {
    transform: translate(-50%, -50%) scale(0.97);
  }
  /* Arrow circle on the right of START */
  .start-btn .arrow-circle {
    width: 32%;
    aspect-ratio: 1;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .start-btn .arrow-circle svg {
    width: 55%; height: 55%;
    fill: white;
  }

  /* ── Music toggle (bottom-right, always visible) ── */
  .music-btn {
    position: absolute;
    bottom: 2.5%;
    right: 1.5%;
    width: 3.5%;
    aspect-ratio: 1;
    background: rgba(255,255,255,0.15);
    border: 0.15% solid rgba(255,255,255,0.35);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
    z-index: 10;
  }
  .music-btn:hover { background: rgba(255,255,255,0.28); }
  .music-btn svg { width: 50%; height: 50%; fill: white; }
  .music-btn.muted { opacity: 0.45; }
</style>
</head>
<body>

<div class="stage">

  <!-- Pulsing audio button -->
  <button class="audio-btn" id="audio-btn" title="Play introduction">
    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
  </button>

  <!-- START button -->
  <button class="start-btn" id="start-btn" onclick="goStart()">
    START
    <span class="arrow-circle">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </span>
  </button>

  <!-- Music toggle -->
  <button class="music-btn" id="music-btn" onclick="toggleMusic()" title="Toggle music">
    <svg id="music-icon" viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
  </button>

  <audio id="bg-music" src="/puzzle-bg-music.mp3" loop></audio>
  <audio id="narration" src="/start.mp3"></audio>

</div>

<script>
  const bgMusic   = document.getElementById('bg-music');
  const narration = document.getElementById('narration');
  const musicBtn  = document.getElementById('music-btn');
  const musicIcon = document.getElementById('music-icon');
  let musicOn = false;

  bgMusic.volume = 0.35;
  bgMusic.play().then(() => { musicOn = true; }).catch(() => {
    document.addEventListener('click', () => {
      if (!musicOn) { bgMusic.play(); musicOn = true; }
    }, { once: true });
  });

  document.getElementById('audio-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    narration.currentTime = 0;
    narration.play();
  });

  function goStart() {
    window.location.href = '/lesson-mars-map.html';
  }

  function toggleMusic() {
    if (musicOn) {
      bgMusic.pause(); musicOn = false;
      musicBtn.classList.add('muted');
      musicIcon.innerHTML = '<path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
    } else {
      bgMusic.play(); musicOn = true;
      musicBtn.classList.remove('muted');
      musicIcon.innerHTML = '<path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>';
    }
  }
</script>

</body>
</html>
