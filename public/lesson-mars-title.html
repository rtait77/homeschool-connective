<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All About Mars</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #0a1428;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  .stage {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100vw;
    height: 56.25vw;
    max-height: 100vh;
    max-width: 177.78vh;
    background: url('/lesson-mars-title.jpg') center center / cover no-repeat;
  }

  /* Invisible clickable area over "All About Mars" title in the background image */
  .title-hotspot {
    position: absolute;
    left: 51%;
    top: 35%;
    width: 40%;
    height: 22%;
    cursor: pointer;
    z-index: 5;
    /* outline: 2px dashed rgba(255,255,0,0.3); */ /* uncomment to debug position */
  }

  /* Button group — centered in right panel below the dividing line */
  .btn-group {
    position: absolute;
    left: 69%;
    top: 73%;
    transform: translate(-50%, -50%);
    display: inline-flex;
    align-items: center;
    z-index: 10;
  }

  /* Green audio circle — overlaps the left edge of the red button */
  .audio-btn {
    width: 3.4vw;
    height: 3.4vw;
    background: #21c593;
    border: none;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
    margin-right: -1.7vw;
    animation: audioPulse 2s ease-in-out infinite;
    box-shadow: 0 0 0 0 rgba(33,197,147,0.7);
  }
  .audio-btn svg { width: 48%; height: 48%; fill: white; }

  @keyframes audioPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(33,197,147,0.7); }
    50%       { box-shadow: 0 0 0 0.9vw rgba(33,197,147,0); }
  }

  /* Red pill START button */
  .start-btn {
    height: 4.8vw;
    padding: 0 1.2vw 0 2.2vw;
    background: #d92343;
    color: white;
    border: none;
    border-radius: 2.4vw;
    font-family: 'Nunito', sans-serif;
    font-size: 1.7vw;
    font-weight: 900;
    letter-spacing: 0.14em;
    cursor: pointer;
    position: relative;
    z-index: 1;
    box-shadow: 0 0.3vw 1.5vw rgba(217,35,67,0.5);
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex; align-items: center; gap: 1vw;
  }
  .start-btn:hover {
    transform: scale(1.04);
    box-shadow: 0 0.4vw 2vw rgba(217,35,67,0.7);
  }
  .start-btn:active { transform: scale(0.97); }

  /* Arrow circle on right end of START button */
  .arrow-circle {
    width: 3.4vw;
    height: 3.4vw;
    background: rgba(255,255,255,0.22);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .arrow-circle svg { width: 55%; height: 55%; fill: white; }

  /* Music toggle — bottom-right corner */
  .music-btn {
    position: absolute;
    bottom: 2.5%; right: 1.5%;
    width: 3.8vw; height: 3.8vw;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
    z-index: 10;
  }
  .music-btn:hover { background: rgba(255,255,255,0.28); }
  .music-btn svg { width: 50%; height: 50%; fill: white; }
  .music-btn.muted { opacity: 0.45; }
</style>
</head>
<body>

<div class="stage">

  <!-- Invisible hotspot over "All About Mars" title — plays title voiceover -->
  <div class="title-hotspot" onclick="playTitleAudio()" title="Hear the title"></div>

  <!-- START button group — centered in right panel below the line -->
  <div class="btn-group">
    <!-- Green audio circle — overlaps left edge of red button -->
    <button class="audio-btn" onclick="playStartAudio()" title="Play introduction">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    </button>

    <!-- Red pill START button with arrow circle -->
    <button class="start-btn" onclick="goStart()">
      START
      <span class="arrow-circle">
        <svg viewBox="0 0 24 24"><path d="M8.59 16.58L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.42z"/></svg>
      </span>
    </button>
  </div>

  <!-- Music toggle -->
  <button class="music-btn" id="music-btn" onclick="toggleMusic()" title="Toggle music">
    <svg id="music-icon" viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
  </button>

  <audio id="bg-music" src="/puzzle-bg-music.mp3" loop></audio>
  <audio id="title-audio" src="/all about mars.mp3"></audio>
  <audio id="start-audio" src="/start.mp3"></audio>

</div>

<script>
  const bgMusic    = document.getElementById('bg-music');
  const titleAudio = document.getElementById('title-audio');
  const startAudio = document.getElementById('start-audio');
  const musicBtn   = document.getElementById('music-btn');
  const musicIcon  = document.getElementById('music-icon');
  let musicOn = false;

  bgMusic.volume = 0.35;
  bgMusic.play().then(() => { musicOn = true; }).catch(() => {
    document.addEventListener('click', () => {
      if (!musicOn) { bgMusic.play(); musicOn = true; }
    }, { once: true });
  });

  function playTitleAudio() {
    titleAudio.currentTime = 0;
    titleAudio.play();
  }

  function playStartAudio(e) {
    if (e) e.stopPropagation();
    startAudio.currentTime = 0;
    startAudio.play();
  }

  function goStart() {
    (window.top || window).location.href = '/mars-map';
  }

  function toggleMusic() {
    if (musicOn) {
      bgMusic.pause(); musicOn = false;
      musicBtn.classList.add('muted');
      musicIcon.innerHTML = '<path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
    } else {
      bgMusic.play(); musicOn = true;
      musicBtn.classList.remove('muted');
      musicIcon.innerHTML = '<path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>';
    }
  }
</script>

</body>
</html>
