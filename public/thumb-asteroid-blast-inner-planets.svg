<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" font-family="Nunito, sans-serif">
  <!-- Space background with warm sun glow at left -->
  <rect width="400" height="300" fill="#080c24"/>
  <radialGradient id="sunGlow" cx="0%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#ff9b3f" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#080c24" stop-opacity="0"/>
  </radialGradient>
  <rect width="400" height="300" fill="url(#sunGlow)"/>
  <!-- Stars -->
  <circle cx="150" cy="20" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="210" cy="45" r="1" fill="white" opacity="0.6"/>
  <circle cx="290" cy="30" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="360" cy="60" r="1" fill="white" opacity="0.5"/>
  <circle cx="370" cy="20" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="320" cy="75" r="1" fill="white" opacity="0.5"/>
  <circle cx="380" cy="160" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="340" cy="220" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="250" cy="275" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="200" cy="260" r="1" fill="white" opacity="0.5"/>
  <!-- Large asteroid -->
  <polygon points="200,88 245,106 265,138 258,173 232,196 195,202 162,190 148,160 155,126 178,103"
    fill="hsl(28,18%,38%)" stroke="hsl(28,18%,54%)" stroke-width="2"/>
  <circle cx="185" cy="133" r="14" fill="hsl(28,18%,28%)" opacity="0.7"/>
  <circle cx="225" cy="158" r="9" fill="hsl(28,18%,28%)" opacity="0.6"/>
  <!-- Small asteroids -->
  <polygon points="68,118 82,124 88,138 84,151 72,158 60,153 54,140 58,127"
    fill="hsl(25,15%,35%)" stroke="hsl(25,15%,50%)" stroke-width="1.5"/>
  <polygon points="320,83 334,89 340,103 336,116 324,123 312,118 306,105 310,92"
    fill="hsl(30,12%,32%)" stroke="hsl(30,12%,47%)" stroke-width="1.5"/>
  <!-- Explosion -->
  <text x="200" y="156" text-anchor="middle" font-size="28">💥</text>
  <!-- Title -->
  <text x="200" y="236" text-anchor="middle" font-size="24" font-weight="900" fill="white">BLAST THE</text>
  <text x="200" y="264" text-anchor="middle" font-size="20" font-weight="900" fill="#f9d84a">INNER PLANETS!</text>
</svg>
