<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" font-family="Nunito, sans-serif">
  <!-- Space background -->
  <rect width="400" height="300" fill="#080c24"/>
  <!-- Stars -->
  <circle cx="30" cy="25" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="80" cy="55" r="1" fill="white" opacity="0.5"/>
  <circle cx="150" cy="20" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="210" cy="45" r="1" fill="white" opacity="0.6"/>
  <circle cx="290" cy="30" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="360" cy="60" r="1" fill="white" opacity="0.5"/>
  <circle cx="370" cy="20" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="50" cy="80" r="1" fill="white" opacity="0.6"/>
  <circle cx="120" cy="70" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="320" cy="75" r="1" fill="white" opacity="0.5"/>
  <circle cx="390" cy="90" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="20" cy="140" r="1" fill="white" opacity="0.6"/>
  <circle cx="380" cy="160" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="60" cy="200" r="1" fill="white" opacity="0.5"/>
  <circle cx="340" cy="220" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="100" cy="260" r="1" fill="white" opacity="0.6"/>
  <circle cx="250" cy="275" r="1.2" fill="white" opacity="0.7"/>
  <!-- Large asteroid (center) -->
  <polygon points="200,90 245,108 265,140 258,175 232,198 195,204 162,192 148,162 155,128 178,105"
    fill="hsl(28,18%,38%)" stroke="hsl(28,18%,54%)" stroke-width="2"/>
  <circle cx="185" cy="135" r="14" fill="hsl(28,18%,28%)" opacity="0.7"/>
  <circle cx="225" cy="160" r="9" fill="hsl(28,18%,28%)" opacity="0.6"/>
  <!-- Small asteroids -->
  <polygon points="70,120 84,126 90,140 86,153 74,160 62,155 56,142 60,129"
    fill="hsl(25,15%,35%)" stroke="hsl(25,15%,50%)" stroke-width="1.5"/>
  <circle cx="68" cy="138" r="5" fill="hsl(25,15%,25%)" opacity="0.7"/>
  <polygon points="320,85 334,91 340,105 336,118 324,125 312,120 306,107 310,94"
    fill="hsl(30,12%,32%)" stroke="hsl(30,12%,47%)" stroke-width="1.5"/>
  <!-- Explosion effect -->
  <circle cx="200" cy="148" r="22" fill="none" stroke="#f9d84a" stroke-width="2" opacity="0.3"/>
  <text x="200" y="158" text-anchor="middle" font-size="28">💥</text>
  <!-- Title -->
  <text x="200" y="238" text-anchor="middle" font-size="26" font-weight="900" fill="white"
    style="text-shadow: 0 2px 8px rgba(0,0,0,0.8)">BLAST THE</text>
  <text x="200" y="268" text-anchor="middle" font-size="26" font-weight="900" fill="#f9d84a">PLANETS!</text>
</svg>
